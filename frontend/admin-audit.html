<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал аудита — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/admin.css">
    <link rel="stylesheet" href="styles/admin-audit.css">
</head>
<body>
<div id="main-nav"></div>
<div id="admin-loading">Загрузка…</div>

<div class="admin-container" id="admin-content" hidden>
    <div class="admin-header">
        <h1>📋 Журнал аудита</h1>
        <p>Административные действия — только для администраторов</p>
    </div>

    <div class="filters-section">
        <h2>Фильтры</h2>
        <div class="filters-grid">
            <div class="filter-group">
                <label for="f-action">Действие</label>
                <select id="f-action">
                    <option value="">— Все —</option>
                    <option value="ban_user">ban_user</option>
                    <option value="unban_user">unban_user</option>
                    <option value="delete_user">delete_user</option>
                    <option value="balance_adjust">balance_adjust</option>
                    <option value="news_create">news_create</option>
                    <option value="news_update">news_update</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="f-admin-id">ID администратора</label>
                <input type="text" id="f-admin-id" placeholder="например, 5">
            </div>
            <div class="filter-group">
                <label for="f-target-type">Тип цели</label>
                <select id="f-target-type">
                    <option value="">— Все —</option>
                    <option value="user">user</option>
                    <option value="news">news</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="f-target-id">ID цели</label>
                <input type="text" id="f-target-id" placeholder="например, 42">
            </div>
            <div class="filter-group">
                <label for="f-date-from">Дата с (YYYY-MM-DD)</label>
                <input type="date" id="f-date-from">
            </div>
            <div class="filter-group">
                <label for="f-date-to">Дата по (YYYY-MM-DD)</label>
                <input type="date" id="f-date-to">
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn btn-primary" id="btn-apply">Применить</button>
            <button class="btn btn-secondary" id="btn-reset">Сбросить</button>
        </div>
    </div>

    <div id="flash-container"></div>

    <div id="table-area">
        <div class="table-wrapper" id="table-wrapper" hidden>
            <table id="audit-table">
                <thead>
                    <tr>
                        <th>Дата/Время</th>
                        <th>Администратор</th>
                        <th>Действие</th>
                        <th>Цель</th>
                        <th>IP</th>
                        <th>Детали</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="audit-tbody"></tbody>
            </table>
        </div>
        <div id="state-empty" class="state-msg" hidden>Нет записей, соответствующих фильтрам</div>
        <div id="state-loading" class="state-msg">Загрузка данных…</div>
    </div>

    <div class="pagination" id="pagination" hidden>
        <button id="btn-prev" disabled>← Назад</button>
        <span class="pagination-info" id="pagination-info"></span>
        <button id="btn-next" disabled>Вперёд →</button>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-filters.js"></script>
<script src="js/admin-audit.js"></script>
</body>
</html>
