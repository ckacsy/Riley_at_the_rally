<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости — Админ — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/admin-news.css">
</head>
<body>
<div id="main-nav"></div>
<div id="admin-loading">Загрузка…</div>

<div class="admin-container" id="admin-content" hidden>
    <div class="admin-header">
        <a href="/admin" class="admin-back">← Назад</a>
        <h1>📰 Новости</h1>
    </div>

    <div id="flash-container"></div>

    <div class="admin-news-layout">
        <!-- Left: news list -->
        <div class="news-list-panel">
            <h2>Список новостей</h2>
            <div class="news-list-actions">
                <button class="btn-new-news" id="btn-new-news">+ Создать новость</button>
            </div>
            <div id="news-list-state" class="state-msg" hidden></div>
            <div id="news-list"></div>
        </div>

        <!-- Right: editor -->
        <div class="news-editor-panel" id="editor-panel">
            <h2 id="editor-title">Редактор</h2>
            <div id="editor-placeholder" class="state-msg">
                Выберите новость из списка или нажмите «Создать»
            </div>

            <form class="editor-form" id="editor-form" hidden autocomplete="off">
                <div id="editor-flash"></div>

                <div class="form-row">
                    <label for="field-title">Заголовок</label>
                    <input type="text" id="field-title" class="form-input" required placeholder="Заголовок новости">
                </div>
                <div class="form-row-two">
                    <div class="form-row">
                        <label for="field-slug">Slug (авто, если пусто)</label>
                        <input type="text" id="field-slug" class="form-input" placeholder="my-news-slug">
                    </div>
                    <div class="form-row">
                        <label for="field-status">Статус</label>
                        <select id="field-status" class="form-select">
                            <option value="draft">Черновик</option>
                            <option value="published">Опубликовано</option>
                            <option value="archived">Архив</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <label for="field-summary">Краткое описание</label>
                    <input type="text" id="field-summary" class="form-input" placeholder="Краткое описание…">
                </div>
                <div class="form-row">
                    <label for="field-cover">Обложка (URL изображения)</label>
                    <input type="url" id="field-cover" class="form-input" placeholder="https://…">
                </div>
                <div class="form-row">
                    <div class="form-checkbox-row">
                        <input type="checkbox" id="field-pinned">
                        <label for="field-pinned">Закреплённая новость</label>
                    </div>
                </div>
                <div class="form-row">
                    <label for="field-body">Текст (Markdown)</label>
                    <textarea id="field-body" class="form-textarea" placeholder="## Заголовок&#10;&#10;Текст статьи…" rows="12"></textarea>
                </div>

                <div class="preview-toggle">
                    <button type="button" class="btn-preview" id="btn-toggle-preview">👁 Предпросмотр</button>
                </div>
                <div id="preview-pane" class="preview-pane" hidden></div>

                <div class="editor-actions">
                    <button type="submit" class="btn-save" id="btn-save">Сохранить</button>
                    <button type="button" class="btn-cancel-edit" id="btn-cancel-edit">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="vendor/marked.umd.js"></script>
<script src="vendor/purify.min.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-news.js"></script>
</body>
</html>
