<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-nav"><a href="/">← Главная</a></div>
    <div class="auth-card">
        <h1>🔒 Сброс пароля</h1>
        <form id="reset-form" novalidate>
            <div class="form-group">
                <label for="password">Новый пароль</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password"
                        placeholder="Новый пароль"
                        autocomplete="new-password" maxlength="128"
                        aria-describedby="password-err">
                    <button type="button" class="toggle-pw" aria-label="Показать/скрыть пароль" data-target="password">👁</button>
                </div>
                <div class="field-error" id="password-err" role="alert"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">Подтвердите пароль</label>
                <div class="input-wrap">
                    <input type="password" id="confirm-password" name="confirm_password"
                        placeholder="Повторите новый пароль"
                        autocomplete="new-password" maxlength="128"
                        aria-describedby="confirm-password-err">
                    <button type="button" class="toggle-pw" aria-label="Показать/скрыть пароль" data-target="confirm-password">👁</button>
                </div>
                <div class="field-error" id="confirm-password-err" role="alert"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Сохранить пароль</span>
                <span class="spinner" id="btn-spinner"></span>
            </button>
        </form>
        <div class="error-box" id="error-box"></div>
        <div class="success-box" id="success-box"></div>
        <div class="back-link"><a href="/login">← Вернуться ко входу</a></div>
    </div>

    <script src="js/reset-password.js"></script>
</body>
</html>
