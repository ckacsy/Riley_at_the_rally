<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация чата — Админ — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/admin.css">
    <link rel="stylesheet" href="styles/admin-chat.css">
</head>
<body>
<div id="main-nav"></div>
<div id="admin-loading">Загрузка…</div>

<div class="admin-container" id="admin-content" hidden>
    <div class="admin-header">
        <a href="/admin" class="admin-back">← Назад</a>
        <h1>💬 Модерация чата</h1>
    </div>

    <div id="flash-container"></div>

    <div class="chat-toolbar">
        <button class="btn-refresh" id="btn-refresh">↻ Обновить</button>
        <span class="chat-status" id="chat-status"></span>
    </div>

    <div id="chat-state" class="state-msg" hidden></div>

    <div class="chat-table-wrap" id="chat-table-wrap" hidden>
        <table class="chat-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Сообщение</th>
                    <th>Время</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="chat-tbody"></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-chat.js"></script>
</body>
</html>
