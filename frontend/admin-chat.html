<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация чата — Админ — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/admin.css">
    <style>
        body { background: #0a0e1a; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
        .admin-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .admin-header h1 { font-size: 24px; font-weight: bold; flex: 1; }
        .admin-back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
        .admin-back:hover { color: #fff; }

        #flash-container { margin-bottom: 16px; }

        .chat-toolbar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .btn-refresh {
            padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.12); }

        .chat-status {
            font-size: 13px; color: rgba(255,255,255,0.5);
        }

        .chat-table-wrap {
            overflow-x: auto;
        }
        .chat-table {
            width: 100%; border-collapse: collapse; font-size: 14px;
        }
        .chat-table th {
            text-align: left; padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5); font-size: 12px; font-weight: normal;
            white-space: nowrap;
        }
        .chat-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            vertical-align: top;
        }
        .chat-table tr:hover td { background: rgba(255,255,255,0.03); }

        .msg-id { color: rgba(255,255,255,0.4); font-size: 12px; }
        .msg-user { font-weight: bold; color: #64b5f6; }
        .msg-text { color: rgba(255,255,255,0.85); word-break: break-word; max-width: 480px; }
        .msg-text--deleted { color: rgba(255,255,255,0.35); font-style: italic; }
        .msg-time { color: rgba(255,255,255,0.4); font-size: 12px; white-space: nowrap; }
        .msg-deleted-by { color: rgba(255,87,34,0.7); font-size: 12px; }

        .btn-delete {
            padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
            background: rgba(229,57,53,0.15); border: 1px solid rgba(229,57,53,0.4);
            color: #ef9a9a;
        }
        .btn-delete:hover { background: rgba(229,57,53,0.3); }
        .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }

        .deleted-label {
            display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px;
            background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.35);
        }

        .state-msg { padding: 32px 0; color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; }

        [hidden] { display: none !important; }
        #admin-loading {
            position: fixed; inset: 0; background: #0a0e1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: rgba(255,255,255,0.7);
        }

        .pagination {
            display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap;
        }
        .pagination button {
            padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
        }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .page-info { color: rgba(255,255,255,0.5); font-size: 13px; }
    </style>
</head>
<body>
<div id="main-nav"></div>
<div id="admin-loading">Загрузка…</div>

<div class="admin-container" id="admin-content" hidden>
    <div class="admin-header">
        <a href="/admin" class="admin-back">← Назад</a>
        <h1>💬 Модерация чата</h1>
    </div>

    <div id="flash-container"></div>

    <div class="chat-toolbar">
        <button class="btn-refresh" id="btn-refresh">↻ Обновить</button>
        <span class="chat-status" id="chat-status"></span>
    </div>

    <div id="chat-state" class="state-msg" hidden></div>

    <div class="chat-table-wrap" id="chat-table-wrap" hidden>
        <table class="chat-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Сообщение</th>
                    <th>Время</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="chat-tbody"></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-chat.js"></script>
</body>
</html>
