<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинги — Riley at the Rally</title>
    <!-- Open Graph meta (defaults; updated dynamically once leaderboard loads) -->
    <meta property="og:title" content="Рекорды RC-гонок — Riley at the Rally" id="og-title">
    <meta property="og:description" content="Лучшие круги гонщиков на RC-машинах. Присоединяйтесь!" id="og-description">
    <meta property="og:type" content="website">
    <meta property="og:url" content="" id="og-url">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .no-data {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin: 8px 0;
        }
        /* Leaderboard */
        .section-title {
            text-align: center;
            color: #333;
            margin: 40px 0 16px;
            font-size: 20px;
        }
        .leaderboard-wrap {
            max-width: 700px;
            margin: 0 auto 40px;
            overflow-x: auto;
        }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .leaderboard-table th {
            background-color: #007BFF;
            color: white;
            padding: 10px 14px;
            text-align: left;
            font-size: 14px;
        }
        .leaderboard-table td {
            padding: 9px 14px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .leaderboard-table tr:last-child td { border-bottom: none; }
        .leaderboard-table tr:nth-child(odd) td { background-color: #f9f9f9; }
        .medal-1 { color: #FFD700; font-weight: bold; }
        .medal-2 { color: #C0C0C0; font-weight: bold; }
        .medal-3 { color: #CD7F32; font-weight: bold; }
        .leaderboard-tabs {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .leaderboard-tab {
            padding: 7px 20px;
            border-radius: 20px;
            border: 2px solid #007BFF;
            background: white;
            color: #007BFF;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        .leaderboard-tab.active { background: #007BFF; color: white; }
        .leaderboard-tab:hover:not(.active) { background: #e7f0ff; }
        .leaderboard-copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 20px;
            border: 2px solid #28a745;
            background: white;
            color: #28a745;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        .leaderboard-copy-btn:hover { background: #28a745; color: white; }
        .leaderboard-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        /* Auth nav bar */
        .auth-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            max-width: 960px;
            margin: 0 auto 16px;
            font-size: 14px;
        }
        .auth-nav a { color: #007BFF; text-decoration: none; }
        .auth-nav a:hover { text-decoration: underline; }
        .auth-nav .user-greeting { color: #555; font-weight: bold; }
        .auth-nav .logout-btn {
            background: none;
            border: 1px solid #dc3545;
            color: #dc3545;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s, color 0.2s;
        }
        .auth-nav .logout-btn:hover { background-color: #dc3545; color: white; }
        .auth-nav .user-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            object-fit: cover; border: 1px solid #ccc; vertical-align: middle;
        }
        .auth-nav .avatar-placeholder {
            width: 28px; height: 28px; border-radius: 50%;
            background: #6c757d; display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 13px; color: white; vertical-align: middle; font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Auth navigation -->
    <div class="auth-nav" id="auth-nav">
        <span id="auth-loading" style="color:#aaa">…</span>
    </div>

    <h1 id="leaderboard-section">🏆 Рекорды — лучшие круги</h1>
    <p class="subtitle"><a href="/garage" style="color:#007BFF;text-decoration:none;">← Вернуться в гараж</a></p>

    <!-- Global Leaderboard Section -->
    <div class="leaderboard-wrap">
        <div class="leaderboard-actions">
            <div class="leaderboard-tabs">
                <button class="leaderboard-tab active" data-range="all">Все</button>
                <button class="leaderboard-tab" data-range="week">Неделя</button>
                <button class="leaderboard-tab" data-range="day">Сутки</button>
            </div>
            <button class="leaderboard-copy-btn" id="lb-copy-btn" title="Скопировать ссылку на рейтинг">
                🔗 Скопировать ссылку
            </button>
        </div>
        <div id="leaderboard-container">
            <p class="no-data">Загрузка рекордов…</p>
        </div>
    </div>

    <script>
        let currentUser = null;
        let csrfToken = '';

        // Fetch CSRF token on page load
        fetch('/api/csrf-token')
            .then(function (r) { return r.json(); })
            .then(function (d) { csrfToken = d.csrfToken || ''; });

        // Load auth state and render nav
        function loadAuthNav() {
            fetch('/api/auth/me')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    currentUser = data.user || null;
                    const nav = document.getElementById('auth-nav');
                    if (currentUser) {
                        nav.innerHTML = '';

                        if (currentUser.avatar_path) {
                            const img = document.createElement('img');
                            img.className = 'user-avatar';
                            img.src = currentUser.avatar_path;
                            img.alt = 'Аватар';
                            nav.appendChild(img);
                        } else {
                            const placeholder = document.createElement('span');
                            placeholder.className = 'avatar-placeholder';
                            placeholder.textContent = currentUser.username.charAt(0).toUpperCase();
                            nav.appendChild(placeholder);
                        }

                        const greeting = document.createElement('span');
                        greeting.className = 'user-greeting';
                        greeting.textContent = '👤 ' + currentUser.username;
                        nav.appendChild(greeting);

                        const garageLink = document.createElement('a');
                        garageLink.href = '/garage';
                        garageLink.textContent = 'Гараж';
                        nav.appendChild(garageLink);

                        const profileLink = document.createElement('a');
                        profileLink.href = '/profile';
                        profileLink.textContent = 'Профиль';
                        nav.appendChild(profileLink);

                        const logoutBtn = document.createElement('button');
                        logoutBtn.className = 'logout-btn';
                        logoutBtn.id = 'logout-btn';
                        logoutBtn.textContent = 'Выйти';
                        logoutBtn.addEventListener('click', function () {
                            fetch('/api/auth/logout', {
                                method: 'POST',
                                headers: { 'x-csrf-token': csrfToken }
                            })
                                .then(function () { currentUser = null; loadAuthNav(); });
                        });
                        nav.appendChild(logoutBtn);
                    } else {
                        nav.innerHTML =
                            '<a href="/garage">Гараж</a>' +
                            '<a href="/login">Войти</a>' +
                            '<a href="/register" style="background:#28a745;color:white;padding:6px 14px;border-radius:5px">Регистрация</a>';
                    }
                })
                .catch(function () {
                    document.getElementById('auth-nav').innerHTML =
                        '<a href="/garage">Гараж</a>' +
                        '<a href="/login">Войти</a>' +
                        '<a href="/register" style="background:#28a745;color:white;padding:6px 14px;border-radius:5px">Регистрация</a>';
                });
        }

        loadAuthNav();

        function formatLapTime(ms) {
            const mins = String(Math.floor(ms / 60000)).padStart(2, '0');
            const secs = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
            const millis = String(ms % 1000).padStart(3, '0');
            return `${mins}:${secs}.${millis}`;
        }

        function renderLeaderboard(entries, range) {
            const container = document.getElementById('leaderboard-container');
            if (!entries || entries.length === 0) {
                container.innerHTML = '<p class="no-data">Рекордов пока нет. Станьте первым!</p>';
                return;
            }
            const medals = ['medal-1', 'medal-2', 'medal-3'];
            const rows = entries.map(function (e, i) {
                const rankClass = medals[i] || '';
                const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
                return `<tr>
                    <td class="${rankClass}">${rank}</td>
                    <td>${e.carName}</td>
                    <td>${e.userId}</td>
                    <td><strong>${formatLapTime(e.lapTimeMs)}</strong></td>
                    <td>${new Date(e.date).toLocaleDateString()}</td>
                </tr>`;
            }).join('');
            container.innerHTML = `
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>#</th><th>Машина</th><th>Гонщик</th><th>Время круга</th><th>Дата</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;

            if (entries.length > 0) {
                const top = entries[0];
                const ogTitle = document.getElementById('og-title');
                const ogDesc = document.getElementById('og-description');
                const safeUserId = String(top.userId || '').replace(/[<>"&]/g, function (c) { return {'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]; });
                const safeCarName = String(top.carName || '').replace(/[<>"&]/g, function (c) { return {'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]; });
                if (ogTitle) ogTitle.content = 'Рекорд круга: ' + formatLapTime(top.lapTimeMs) + ' — ' + safeUserId + ' на ' + safeCarName;
                if (ogDesc) ogDesc.content = 'Лучший круг: ' + formatLapTime(top.lapTimeMs) + ' (' + safeUserId + ', ' + safeCarName + '). Присоединяйтесь и побейте!';
                const ogUrl = document.getElementById('og-url');
                if (ogUrl) ogUrl.content = window.location.origin + '/?leaderboard=' + encodeURIComponent(range || 'all') + '#leaderboard-section';
            }
        }

        var currentLbRange = 'all';

        function loadLeaderboard(range) {
            range = range || currentLbRange;
            fetch('/api/leaderboard?range=' + encodeURIComponent(range), { cache: 'no-store' })
                .then(function (res) { return res.json(); })
                .then(function (data) { renderLeaderboard(data.leaderboard, data.range || range); })
                .catch(function () {
                    document.getElementById('leaderboard-container').innerHTML =
                        '<p class="no-data">Не удалось загрузить рекорды.</p>';
                });
        }

        // Leaderboard tabs
        document.querySelectorAll('.leaderboard-tab').forEach(function (tab) {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.leaderboard-tab').forEach(function (t) { t.classList.remove('active'); });
                tab.classList.add('active');
                currentLbRange = tab.getAttribute('data-range');
                loadLeaderboard(currentLbRange);
                var url = new URL(window.location.href);
                url.searchParams.set('leaderboard', currentLbRange);
                url.hash = 'leaderboard-section';
                window.history.replaceState(null, '', url.toString());
            });
        });

        // Copy link button
        document.getElementById('lb-copy-btn').addEventListener('click', function () {
            var url = new URL(window.location.href);
            url.searchParams.set('leaderboard', currentLbRange);
            url.hash = 'leaderboard-section';
            var shareUrl = url.toString();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shareUrl).then(function () {
                    var btn = document.getElementById('lb-copy-btn');
                    var orig = btn.textContent;
                    btn.textContent = '✅ Скопировано!';
                    setTimeout(function () { btn.textContent = orig; }, 2000);
                }).catch(function () {
                    prompt('Скопируйте ссылку:', shareUrl);
                });
            } else {
                prompt('Скопируйте ссылку:', shareUrl);
            }
        });

        // On load: check ?leaderboard= param and activate correct tab
        (function () {
            var params = new URLSearchParams(window.location.search);
            var rangeParam = params.get('leaderboard');
            var validRanges = ['all', 'week', 'day'];
            if (rangeParam && validRanges.indexOf(rangeParam) !== -1) {
                currentLbRange = rangeParam;
                document.querySelectorAll('.leaderboard-tab').forEach(function (t) { t.classList.remove('active'); });
                var targetTab = document.querySelector('.leaderboard-tab[data-range="' + rangeParam + '"]');
                if (targetTab) targetTab.classList.add('active');
                if (window.location.hash === '#leaderboard-section') {
                    setTimeout(function () {
                        var el = document.getElementById('leaderboard-section');
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }, 300);
                }
            }
        })();

        loadLeaderboard();
        setInterval(function () { loadLeaderboard(currentLbRange); }, 10000);
    </script>
</body>
</html>
