<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Car Control Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 15px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            background-color: #ccc;
            vertical-align: middle;
        }
        .status-indicator.connected {
            background-color: #28a745;
        }
        .status-indicator.disconnected {
            background-color: #dc3545;
        }
        .camera-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
            max-width: 680px;
        }
        .camera-section h2 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #333;
        }
        .camera-feed {
            width: 640px;
            height: 480px;
            background-color: #000;
            border: 2px solid #ccc;
            border-radius: 5px;
            object-fit: contain;
        }
        .camera-url-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }
        .camera-url-input {
            flex: 1;
            max-width: 480px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .camera-url-btn {
            padding: 6px 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .camera-url-btn:hover {
            background-color: #0056b3;
        }
        .speed-control {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            font-size: 16px;
            color: #333;
        }
        .speed-control label {
            font-weight: bold;
        }
        .speed-control input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 8px;
            border-radius: 5px;
            background-color: #007BFF;
            outline: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .speed-control input[type="range"]:hover {
            background-color: #0056b3;
        }
        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #007BFF;
            cursor: pointer;
        }
        .speed-control input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #007BFF;
            cursor: pointer;
        }
        .speed-control span {
            min-width: 32px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>RC Car Control Interface</h1>

    <div class="camera-section">
        <h2>Live Camera Feed</h2>
        <img id="camera-feed" class="camera-feed" src="" alt="Live camera feed — not connected" />
        <div class="camera-url-row">
            <input
                type="text"
                id="camera-url-input"
                class="camera-url-input"
                placeholder="http://<pi-ip>:8000"
            />
            <button class="camera-url-btn" id="camera-url-btn">Connect</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="button" id="forward">Forward</button>
        <button class="button" id="backward">Backward</button>
    </div>
    <div class="control-panel">
        <button class="button" id="left">Left</button>
        <button class="button" id="right">Right</button>
    </div>
    <div class="speed-control">
        <label for="speed-slider">Speed:</label>
        <input type="range" id="speed-slider" min="0" max="100" value="50" />
        <span id="speed-value">50</span>
    </div>
    <div class="status">
        <span class="status-indicator disconnected" id="status-dot"></span>
        <span id="status-text">Disconnected</span>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io(window.location.origin);

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        speedSlider.addEventListener('input', function () {
            speedValue.textContent = speedSlider.value;
        });

        socket.on('connect', function () {
            statusDot.classList.remove('disconnected');
            statusDot.classList.add('connected');
            statusText.textContent = 'Connected';
        });

        socket.on('disconnect', function () {
            statusDot.classList.remove('connected');
            statusDot.classList.add('disconnected');
            statusText.textContent = 'Disconnected';
        });

        document.getElementById('forward').addEventListener('click', function () {
            const speed = parseInt(speedSlider.value, 10);
            socket.emit('control_command', { direction: 'forward', speed: speed });
        });

        document.getElementById('backward').addEventListener('click', function () {
            const speed = parseInt(speedSlider.value, 10);
            socket.emit('control_command', { direction: 'backward', speed: -speed });
        });

        document.getElementById('left').addEventListener('click', function () {
            socket.emit('control_command', { steering_angle: -30 });
        });

        document.getElementById('right').addEventListener('click', function () {
            socket.emit('control_command', { steering_angle: 30 });
        });

        document.getElementById('camera-url-btn').addEventListener('click', function () {
            const url = document.getElementById('camera-url-input').value.trim();
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                const feed = document.getElementById('camera-feed');
                feed.src = url;
                feed.alt = 'Live camera feed';
            }
        });
    </script>
</body>
</html>
