<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/admin.css">
    <style>
        /* Analytics page uses a narrower container */
        .admin-container { max-width: 1200px; }

        /* Period selector */
        .period-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .period-section h2 { font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
        .period-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .btn-preset {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-preset:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.35); }
        .btn-preset.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
        .custom-range {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }
        .custom-range-group { display: flex; flex-direction: column; gap: 4px; }
        .custom-range-group label { font-size: 12px; color: rgba(255,255,255,0.5); }
        .custom-range-group input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            padding: 7px 10px;
            font-size: 13px;
        }

        /* Sections */
        .section { margin-bottom: 28px; }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        /* KPI cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .kpi-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 16px 18px;
        }
        .kpi-card-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
        .kpi-card-value { font-size: 22px; font-weight: bold; color: #fff; }

        /* Breakdown cards */
        .breakdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        .breakdown-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 12px 14px;
        }
        .breakdown-card-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 4px; }
        .breakdown-card-value { font-size: 16px; font-weight: bold; color: #fff; }
        .breakdown-card-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }

        /* Bar rows */
        .bar-list { display: flex; flex-direction: column; gap: 8px; }
        .bar-row {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 10px 14px;
        }
        .bar-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }
        .bar-row-name { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: bold; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-row-meta { font-size: 12px; color: rgba(255,255,255,0.55); white-space: nowrap; flex-shrink: 0; }
        .bar-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; background: #3b82f6; transition: width 0.3s; min-width: 2px; }
        .bar-fill--green { background: #22c55e; }
        .bar-fill--amber { background: #f59e0b; }
    </style>
</head>
<body>
<div id="main-nav"></div>
<div id="page-loading">Загрузка…</div>

<div class="admin-container" id="main-content" hidden>
    <div class="admin-header">
        <h1>📊 Аналитика</h1>
        <p>Обзор KPI, разбивка по машинам, топ пользователей и динамика по дням</p>
    </div>

    <!-- Period selector -->
    <div class="period-section">
        <h2>Период</h2>
        <div class="period-presets">
            <button class="btn-preset" data-preset="7d">7 дней</button>
            <button class="btn-preset active" data-preset="30d">30 дней</button>
            <button class="btn-preset" data-preset="90d">90 дней</button>
            <button class="btn-preset" data-preset="all">Всё время</button>
            <button class="btn-preset" data-preset="custom">Произвольный</button>
        </div>
        <div class="custom-range" id="custom-range" hidden>
            <div class="custom-range-group">
                <label for="date-from">С (включительно)</label>
                <input type="date" id="date-from">
            </div>
            <div class="custom-range-group">
                <label for="date-to">По (включительно)</label>
                <input type="date" id="date-to">
            </div>
            <button class="btn btn-primary" id="btn-apply-custom">Применить</button>
        </div>
    </div>

    <div id="flash-container"></div>

    <!-- Analytics content -->
    <div id="analytics-content" hidden>

        <!-- A. KPI cards -->
        <div class="section" id="section-kpi">
            <div class="section-title">Ключевые показатели</div>
            <div class="kpi-grid" id="kpi-grid"></div>
        </div>

        <!-- B. Transaction type breakdown -->
        <div class="section" id="section-txtype">
            <div class="section-title">Транзакции по типам</div>
            <div class="breakdown-grid" id="txtype-grid"></div>
        </div>

        <!-- C. Car breakdown -->
        <div class="section" id="section-cars">
            <div class="section-title">По машинам</div>
            <div class="bar-list" id="cars-bar-list"></div>
        </div>

        <!-- D. Top users by spend -->
        <div class="section" id="section-topusers">
            <div class="section-title">Топ пользователей по расходам</div>
            <div class="bar-list" id="topusers-bar-list"></div>
        </div>

        <!-- E. Daily timeseries -->
        <div class="section" id="section-timeseries">
            <div class="section-title">Динамика по дням</div>
            <div class="bar-list" id="timeseries-bar-list"></div>
        </div>
    </div>

    <div id="state-loading" class="state-loading" hidden>Загрузка данных…</div>
    <div id="state-empty" class="state-empty" hidden>Нет данных за выбранный период</div>
</div>

<script src="js/nav.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-analytics.js"></script>
</body>
</html>
