<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Main layout: sidebar + content ── */
        .broadcast-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Left sidebar: driver presence panel ── */
        .drivers-panel {
            width: 220px;
            min-width: 180px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 8px;
            overflow-y: auto;
        }

        .drivers-panel h2 {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #drivers-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
        }

        .driver-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-success);
            flex-shrink: 0;
        }

        .driver-name {
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drivers-empty {
            color: var(--text-secondary);
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding-top: 12px;
        }

        /* ── Right content: viewport + controls ── */
        .broadcast-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
            overflow: auto;
        }

        /* ── Viewport container ── */
        #broadcast-viewport {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fullscreen state: fill the whole viewport, above fixed navbar */
        #broadcast-viewport.is-fullscreen {
            position: fixed;
            inset: 0;
            max-width: none;
            width: 100vw;
            height: 100vh;
            aspect-ratio: unset;
            border-radius: 0;
            border: none;
            z-index: 1100;
        }

        .viewport-overlay {
            text-align: center;
            user-select: none;
            pointer-events: none;
        }

        .viewport-overlay .overlay-label {
            display: block;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: bold;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .viewport-overlay .overlay-sub {
            display: block;
            margin-top: 8px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        /* ── Video / MJPEG player ── */
        #stream-video,
        #stream-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .stream-error {
            text-align: center;
            color: var(--accent-danger);
            font-size: 13px;
            padding: 12px;
            user-select: none;
        }

        /* Fullscreen exit button — shown only when is-fullscreen */
        #exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--border-color);
            z-index: 10;
        }

        #broadcast-viewport.is-fullscreen #exit-fullscreen-btn {
            display: block;
        }

        #exit-fullscreen-btn:hover { background: rgba(80, 80, 80, 0.8); }

        /* ── Fullscreen toggle button (outside viewport) ── */
        #fullscreen-btn {
            padding: 10px 24px;
        }

        /* Hide the outer fullscreen button when viewport is fullscreen */
        #broadcast-viewport.is-fullscreen ~ #fullscreen-btn {
            display: none;
        }

        /* ── Right sidebar: chat panel ── */
        .chat-panel {
            width: 320px;
            min-width: 260px;
            max-width: 360px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chat-panel-header {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 12px 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .chat-msg {
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-msg .chat-msg-user {
            font-weight: bold;
            color: var(--accent-success);
            margin-right: 4px;
        }

        .chat-msg .chat-msg-text {
            color: var(--text-primary);
        }

        .chat-msg-deleted-text {
            color: var(--text-secondary);
            font-style: italic;
        }

        .chat-msg .chat-msg-time {
            color: var(--text-secondary);
            font-size: 11px;
            margin-left: 4px;
        }

        .chat-msg-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.5;
            padding: 0 2px;
            margin-left: 4px;
            vertical-align: middle;
            line-height: 1;
        }

        .chat-msg-delete-btn:hover {
            opacity: 1;
        }

        .chat-empty {
            color: var(--text-secondary);
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding-top: 16px;
        }

        .chat-jump-btn {
            display: none;
            position: absolute;
            bottom: 60px;
            right: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            z-index: 5;
        }

        .chat-jump-btn.visible { display: block; }

        .chat-input-row {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            padding: 7px 10px;
            outline: none;
            transition: border-color var(--transition-speed);
        }

        .chat-input:focus { border-color: rgba(255, 255, 255, 0.3); }
        .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

        /* flex-shrink is not part of .btn — keep it here */
        .chat-send-btn { flex-shrink: 0; }

        /* Hide chat panel on very small screens */
        @media (max-width: 700px) {
            .chat-panel { display: none; }
        }

        /* ── Camera selector ── */
        .camera-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            width: 100%;
        }

        .camera-selector-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .cam-btn {
            padding: 6px 14px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background var(--transition-speed), color var(--transition-speed), border-color var(--transition-speed);
        }

        .cam-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); border-color: rgba(255, 255, 255, 0.3); }

        .cam-btn.active {
            background: rgba(229, 57, 53, 0.18);
            color: var(--text-primary);
            border-color: rgba(229, 57, 53, 0.5);
        }

        /* Hide camera selector in fullscreen */
        #broadcast-viewport.is-fullscreen ~ .camera-selector { display: none; }
    </style>
</head>
<body>
    <div id="main-nav"></div>

    <div class="broadcast-body">
        <!-- Left panel: active drivers -->
        <aside class="drivers-panel">
            <h2>Активные водители</h2>
            <ul id="drivers-list">
                <li class="drivers-empty" id="drivers-empty">Нет активных водителей</li>
            </ul>
        </aside>

        <!-- Main viewport + controls -->
        <main class="broadcast-main">
            <div id="broadcast-viewport">
                <div class="viewport-overlay" id="stream-placeholder">
                    <span class="overlay-label">ТРАНСЛЯЦИЯ (скоро)</span>
                    <span class="overlay-sub">Трансляция трассы появится здесь</span>
                </div>
                <button id="exit-fullscreen-btn" class="btn" aria-label="Свернуть">Свернуть</button>
            </div>

            <button id="fullscreen-btn" class="btn btn-primary" aria-label="Развернуть на весь экран">Развернуть</button>

            <!-- Camera selector (pluggable — replace data-src values with real stream URLs via API) -->
            <div class="camera-selector" id="camera-selector" role="group" aria-label="Выбор камеры">
                <span class="camera-selector-label">Камеры:</span>
                <button class="cam-btn active" data-cam="cam1" data-label="Камера 1" aria-pressed="true">📷 Камера 1</button>
                <button class="cam-btn" data-cam="cam2" data-label="Камера 2" aria-pressed="false">📷 Камера 2</button>
                <button class="cam-btn" data-cam="cam3" data-label="Камера 3" aria-pressed="false">📷 Камера 3</button>
                <!-- TODO: connect to active session for car cam stream -->
                <button class="cam-btn" data-cam="car" data-label="Камера авто" aria-pressed="false">🚗 Камера авто</button>
            </div>
        </main>

        <!-- Right panel: global chat -->
        <aside class="chat-panel" id="chat-panel">
            <div class="chat-panel-header">💬 Чат</div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-empty" id="chat-empty">Нет сообщений</div>
            </div>
            <button class="chat-jump-btn" id="chat-jump-btn" aria-label="К последнему сообщению">↓ Вниз</button>
            <div class="chat-input-row">
                <input
                    type="text"
                    id="chat-input"
                    class="chat-input"
                    placeholder="Сообщение…"
                    maxlength="300"
                    autocomplete="off"
                />
                <button id="chat-send-btn" class="chat-send-btn btn btn-primary">Отправить</button>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/broadcast.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
