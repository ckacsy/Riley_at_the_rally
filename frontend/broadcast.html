<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция — Riley at the Rally</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top nav bar ── */
        .broadcast-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .broadcast-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .broadcast-nav a:hover { color: #fff; }

        .broadcast-nav .title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        /* ── Main layout ── */
        .broadcast-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
        }

        /* ── Viewport container ── */
        #broadcast-viewport {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fullscreen state: fill the whole viewport */
        #broadcast-viewport.is-fullscreen {
            position: fixed;
            inset: 0;
            max-width: none;
            width: 100vw;
            height: 100vh;
            aspect-ratio: unset;
            border-radius: 0;
            border: none;
            z-index: 1000;
        }

        .viewport-overlay {
            text-align: center;
            user-select: none;
            pointer-events: none;
        }

        .viewport-overlay .overlay-label {
            display: block;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: bold;
            color: #555;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .viewport-overlay .overlay-sub {
            display: block;
            margin-top: 8px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: #333;
            letter-spacing: 1px;
        }

        /* Fullscreen exit button — shown only when is-fullscreen */
        #exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }

        #broadcast-viewport.is-fullscreen #exit-fullscreen-btn {
            display: block;
        }

        #exit-fullscreen-btn:hover { background: rgba(80,80,80,0.8); }

        /* ── Fullscreen toggle button (outside viewport) ── */
        #fullscreen-btn {
            padding: 10px 24px;
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        #fullscreen-btn:hover {
            background: #333;
            border-color: #666;
        }

        /* Hide the outer fullscreen button when viewport is fullscreen */
        #broadcast-viewport.is-fullscreen ~ #fullscreen-btn {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="broadcast-nav">
        <a href="/garage">← Гараж</a>
        <span class="title">📡 Трансляция</span>
        <a href="/">Главная</a>
    </nav>

    <main class="broadcast-main">
        <div id="broadcast-viewport">
            <div class="viewport-overlay">
                <span class="overlay-label">ТРАНСЛЯЦИЯ (скоро)</span>
                <span class="overlay-sub">Трансляция трассы появится здесь</span>
            </div>
            <button id="exit-fullscreen-btn" aria-label="Свернуть">Свернуть</button>
        </div>

        <button id="fullscreen-btn" aria-label="Развернуть на весь экран">Развернуть</button>
    </main>

    <script>
      (function () {
        const viewport = document.getElementById('broadcast-viewport');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const exitBtn = document.getElementById('exit-fullscreen-btn');

        function enterFullscreen() {
          viewport.classList.add('is-fullscreen');
          if (viewport.requestFullscreen) {
            viewport.requestFullscreen().catch(function (err) {
              // Headless / sandboxed environments may reject — CSS class stays.
              console.error('requestFullscreen failed:', err);
            });
          }
        }

        function exitFullscreen() {
          viewport.classList.remove('is-fullscreen');
          if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(function (err) {
              console.error('exitFullscreen failed:', err);
            });
          }
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        exitBtn.addEventListener('click', exitFullscreen);

        // Sync class when the browser's native fullscreen exits (e.g. Esc key)
        document.addEventListener('fullscreenchange', function () {
          if (!document.fullscreenElement) {
            viewport.classList.remove('is-fullscreen');
          }
        });
      })();
    </script>
</body>
</html>
