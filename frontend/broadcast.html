<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция — Riley at the Rally</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top nav bar ── */
        .broadcast-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .broadcast-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .broadcast-nav a:hover { color: #fff; }

        .broadcast-nav .title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        /* ── Main layout: sidebar + content ── */
        .broadcast-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Left sidebar: driver presence panel ── */
        .drivers-panel {
            width: 220px;
            min-width: 180px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 8px;
            overflow-y: auto;
        }

        .drivers-panel h2 {
            font-size: 13px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        #drivers-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-size: 13px;
        }

        .driver-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
        }

        .driver-name {
            color: #e0e0e0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drivers-empty {
            color: #555;
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding-top: 12px;
        }

        /* ── Right content: viewport + controls ── */
        .broadcast-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
            overflow: auto;
        }

        /* ── Viewport container ── */
        #broadcast-viewport {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fullscreen state: fill the whole viewport */
        #broadcast-viewport.is-fullscreen {
            position: fixed;
            inset: 0;
            max-width: none;
            width: 100vw;
            height: 100vh;
            aspect-ratio: unset;
            border-radius: 0;
            border: none;
            z-index: 1000;
        }

        .viewport-overlay {
            text-align: center;
            user-select: none;
            pointer-events: none;
        }

        .viewport-overlay .overlay-label {
            display: block;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: bold;
            color: #555;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .viewport-overlay .overlay-sub {
            display: block;
            margin-top: 8px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: #333;
            letter-spacing: 1px;
        }

        /* Fullscreen exit button — shown only when is-fullscreen */
        #exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }

        #broadcast-viewport.is-fullscreen #exit-fullscreen-btn {
            display: block;
        }

        #exit-fullscreen-btn:hover { background: rgba(80,80,80,0.8); }

        /* ── Fullscreen toggle button (outside viewport) ── */
        #fullscreen-btn {
            padding: 10px 24px;
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        #fullscreen-btn:hover {
            background: #333;
            border-color: #666;
        }

        /* Hide the outer fullscreen button when viewport is fullscreen */
        #broadcast-viewport.is-fullscreen ~ #fullscreen-btn {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="broadcast-nav">
        <a href="/garage">← Гараж</a>
        <span class="title">📡 Трансляция</span>
        <a href="/">Главная</a>
    </nav>

    <div class="broadcast-body">
        <!-- Left panel: active drivers -->
        <aside class="drivers-panel">
            <h2>Активные водители</h2>
            <ul id="drivers-list">
                <li class="drivers-empty" id="drivers-empty">Нет активных водителей</li>
            </ul>
        </aside>

        <!-- Main viewport + controls -->
        <main class="broadcast-main">
            <div id="broadcast-viewport">
                <div class="viewport-overlay">
                    <span class="overlay-label">ТРАНСЛЯЦИЯ (скоро)</span>
                    <span class="overlay-sub">Трансляция трассы появится здесь</span>
                </div>
                <button id="exit-fullscreen-btn" aria-label="Свернуть">Свернуть</button>
            </div>

            <button id="fullscreen-btn" aria-label="Развернуть на весь экран">Развернуть</button>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      (function () {
        // ── Fullscreen toggle ──
        const viewport = document.getElementById('broadcast-viewport');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const exitBtn = document.getElementById('exit-fullscreen-btn');

        function enterFullscreen() {
          viewport.classList.add('is-fullscreen');
          if (viewport.requestFullscreen) {
            viewport.requestFullscreen().catch(function (err) {
              console.error('requestFullscreen failed:', err);
            });
          }
        }

        function exitFullscreen() {
          viewport.classList.remove('is-fullscreen');
          if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(function (err) {
              console.error('exitFullscreen failed:', err);
            });
          }
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        exitBtn.addEventListener('click', exitFullscreen);

        document.addEventListener('fullscreenchange', function () {
          if (!document.fullscreenElement) {
            viewport.classList.remove('is-fullscreen');
          }
        });

        // ── Driver presence ──
        const driversList = document.getElementById('drivers-list');
        const driversEmpty = document.getElementById('drivers-empty');

        function renderDrivers(drivers) {
          // Remove all existing driver items (keep the empty placeholder)
          var items = driversList.querySelectorAll('.driver-item');
          items.forEach(function (el) { el.remove(); });

          if (!drivers || drivers.length === 0) {
            driversEmpty.style.display = '';
            return;
          }

          driversEmpty.style.display = 'none';
          drivers.forEach(function (driver) {
            var li = document.createElement('li');
            li.className = 'driver-item';
            li.setAttribute('data-user-id', driver.userId);

            var dot = document.createElement('span');
            dot.className = 'driver-dot';

            var name = document.createElement('span');
            name.className = 'driver-name';
            name.textContent = driver.username;

            li.appendChild(dot);
            li.appendChild(name);
            driversList.appendChild(li);
          });
        }

        var socket = io(window.location.origin);

        socket.on('connect', function () {
          socket.emit('presence:hello', { page: 'broadcast' });
        });

        socket.on('presence:update', function (data) {
          renderDrivers(data && data.drivers ? data.drivers : []);
        });
      })();
    </script>
</body>
</html>
