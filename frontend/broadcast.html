<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция — Riley at the Rally</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top nav bar ── */
        .broadcast-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .broadcast-nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .broadcast-nav a:hover { color: #fff; }

        .broadcast-nav .title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        /* ── Main layout: sidebar + content ── */
        .broadcast-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Left sidebar: driver presence panel ── */
        .drivers-panel {
            width: 220px;
            min-width: 180px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 8px;
            overflow-y: auto;
        }

        .drivers-panel h2 {
            font-size: 13px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        #drivers-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            font-size: 13px;
        }

        .driver-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
        }

        .driver-name {
            color: #e0e0e0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drivers-empty {
            color: #555;
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding-top: 12px;
        }

        /* ── Right content: viewport + controls ── */
        .broadcast-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
            overflow: auto;
        }

        /* ── Viewport container ── */
        #broadcast-viewport {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fullscreen state: fill the whole viewport */
        #broadcast-viewport.is-fullscreen {
            position: fixed;
            inset: 0;
            max-width: none;
            width: 100vw;
            height: 100vh;
            aspect-ratio: unset;
            border-radius: 0;
            border: none;
            z-index: 1000;
        }

        .viewport-overlay {
            text-align: center;
            user-select: none;
            pointer-events: none;
        }

        .viewport-overlay .overlay-label {
            display: block;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: bold;
            color: #555;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .viewport-overlay .overlay-sub {
            display: block;
            margin-top: 8px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: #333;
            letter-spacing: 1px;
        }

        /* ── Video / MJPEG player ── */
        #stream-video,
        #stream-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .stream-error {
            text-align: center;
            color: #e05555;
            font-size: 13px;
            padding: 12px;
            user-select: none;
        }

        /* Fullscreen exit button — shown only when is-fullscreen */
        #exit-fullscreen-btn {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }

        #broadcast-viewport.is-fullscreen #exit-fullscreen-btn {
            display: block;
        }

        #exit-fullscreen-btn:hover { background: rgba(80,80,80,0.8); }

        /* ── Fullscreen toggle button (outside viewport) ── */
        #fullscreen-btn {
            padding: 10px 24px;
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        #fullscreen-btn:hover {
            background: #333;
            border-color: #666;
        }

        /* Hide the outer fullscreen button when viewport is fullscreen */
        #broadcast-viewport.is-fullscreen ~ #fullscreen-btn {
            display: none;
        }

        /* ── Right sidebar: chat panel ── */
        .chat-panel {
            width: 320px;
            min-width: 260px;
            max-width: 360px;
            background: #111;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .chat-panel-header {
            font-size: 13px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 12px 10px;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .chat-msg {
            font-size: 13px;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-msg .chat-msg-user {
            font-weight: bold;
            color: #4ade80;
            margin-right: 4px;
        }

        .chat-msg .chat-msg-text {
            color: #d0d0d0;
        }

        .chat-msg-deleted-text {
            color: #666;
            font-style: italic;
        }

        .chat-msg .chat-msg-time {
            color: #555;
            font-size: 11px;
            margin-left: 4px;
        }

        .chat-empty {
            color: #444;
            font-size: 12px;
            font-style: italic;
            text-align: center;
            padding-top: 16px;
        }

        .chat-jump-btn {
            display: none;
            position: absolute;
            bottom: 60px;
            right: 12px;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            z-index: 5;
        }

        .chat-jump-btn.visible { display: block; }

        .chat-input-row {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus { border-color: #555; }
        .chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

        .chat-send-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .chat-send-btn:hover { background: #1d4ed8; }
        .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Hide chat panel on very small screens */
        @media (max-width: 700px) {
            .chat-panel { display: none; }
        }
    </style>
</head>
<body>
    <nav class="broadcast-nav">
        <a href="/garage">← Гараж</a>
        <span class="title">📡 Трансляция</span>
        <a href="/">Главная</a>
    </nav>

    <div class="broadcast-body">
        <!-- Left panel: active drivers -->
        <aside class="drivers-panel">
            <h2>Активные водители</h2>
            <ul id="drivers-list">
                <li class="drivers-empty" id="drivers-empty">Нет активных водителей</li>
            </ul>
        </aside>

        <!-- Main viewport + controls -->
        <main class="broadcast-main">
            <div id="broadcast-viewport">
                <div class="viewport-overlay" id="stream-placeholder">
                    <span class="overlay-label">ТРАНСЛЯЦИЯ (скоро)</span>
                    <span class="overlay-sub">Трансляция трассы появится здесь</span>
                </div>
                <button id="exit-fullscreen-btn" aria-label="Свернуть">Свернуть</button>
            </div>

            <button id="fullscreen-btn" aria-label="Развернуть на весь экран">Развернуть</button>
        </main>

        <!-- Right panel: global chat -->
        <aside class="chat-panel" id="chat-panel">
            <div class="chat-panel-header">💬 Чат</div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-empty" id="chat-empty">Нет сообщений</div>
            </div>
            <button class="chat-jump-btn" id="chat-jump-btn" aria-label="К последнему сообщению">↓ Вниз</button>
            <div class="chat-input-row">
                <input
                    type="text"
                    id="chat-input"
                    class="chat-input"
                    placeholder="Сообщение…"
                    maxlength="300"
                    autocomplete="off"
                />
                <button id="chat-send-btn" class="chat-send-btn">Отправить</button>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      (function () {
        // ── Fullscreen toggle ──
        var viewport = document.getElementById('broadcast-viewport');
        var fullscreenBtn = document.getElementById('fullscreen-btn');
        var exitBtn = document.getElementById('exit-fullscreen-btn');

        function enterFullscreen() {
          viewport.classList.add('is-fullscreen');
          if (viewport.requestFullscreen) {
            viewport.requestFullscreen().catch(function (err) {
              console.error('requestFullscreen failed:', err);
            });
          }
        }

        function exitFullscreen() {
          viewport.classList.remove('is-fullscreen');
          if (document.fullscreenElement && document.exitFullscreen) {
            document.exitFullscreen().catch(function (err) {
              console.error('exitFullscreen failed:', err);
            });
          }
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);
        exitBtn.addEventListener('click', exitFullscreen);

        document.addEventListener('fullscreenchange', function () {
          if (!document.fullscreenElement) {
            viewport.classList.remove('is-fullscreen');
          }
        });

        // ── Driver presence ──
        var driversList = document.getElementById('drivers-list');
        var driversEmpty = document.getElementById('drivers-empty');

        function renderDrivers(drivers) {
          var items = driversList.querySelectorAll('.driver-item');
          items.forEach(function (el) { el.remove(); });

          if (!drivers || drivers.length === 0) {
            driversEmpty.style.display = '';
            return;
          }

          driversEmpty.style.display = 'none';
          drivers.forEach(function (driver) {
            var li = document.createElement('li');
            li.className = 'driver-item';
            li.setAttribute('data-user-id', driver.userId);

            var dot = document.createElement('span');
            dot.className = 'driver-dot';

            var name = document.createElement('span');
            name.className = 'driver-name';
            name.textContent = driver.username;

            li.appendChild(dot);
            li.appendChild(name);
            driversList.appendChild(li);
          });
        }

        // ── Chat ──
        var chatMessages = document.getElementById('chat-messages');
        var chatEmpty = document.getElementById('chat-empty');
        var chatInput = document.getElementById('chat-input');
        var chatSendBtn = document.getElementById('chat-send-btn');
        var chatJumpBtn = document.getElementById('chat-jump-btn');

        function isScrolledToBottom() {
          return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 40;
        }

        function scrollToBottom() {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function appendMessage(msg) {
          var wasAtBottom = isScrolledToBottom();
          chatEmpty.style.display = 'none';

          var div = document.createElement('div');
          div.className = 'chat-msg';
          div.setAttribute('data-msg-id', msg.id);

          if (msg.deleted) {
            div.classList.add('chat-msg-deleted');
            var deletedSpan = document.createElement('span');
            deletedSpan.className = 'chat-msg-text chat-msg-deleted-text';
            deletedSpan.textContent = 'Сообщение удалено';
            div.appendChild(deletedSpan);
          } else {
            var userSpan = document.createElement('span');
            userSpan.className = 'chat-msg-user';
            userSpan.textContent = msg.username + ':';

            var textSpan = document.createElement('span');
            textSpan.className = 'chat-msg-text';
            textSpan.textContent = ' ' + msg.message;

            var timeSpan = document.createElement('span');
            timeSpan.className = 'chat-msg-time';
            if (msg.createdAt) {
              var d = new Date(msg.createdAt);
              if (!isNaN(d.getTime())) {
                timeSpan.textContent = ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              }
            }

            div.appendChild(userSpan);
            div.appendChild(textSpan);
            div.appendChild(timeSpan);
          }
          chatMessages.appendChild(div);

          if (wasAtBottom) {
            scrollToBottom();
            chatJumpBtn.classList.remove('visible');
          } else {
            chatJumpBtn.classList.add('visible');
          }
        }

        function markDeleted(id) {
          var el = chatMessages.querySelector('[data-msg-id="' + id + '"]');
          if (!el) return;
          el.innerHTML = '';
          el.classList.add('chat-msg-deleted');
          var span = document.createElement('span');
          span.className = 'chat-msg-text chat-msg-deleted-text';
          span.textContent = 'Сообщение удалено';
          el.appendChild(span);
        }

        chatMessages.addEventListener('scroll', function () {
          if (isScrolledToBottom()) {
            chatJumpBtn.classList.remove('visible');
          }
        });

        chatJumpBtn.addEventListener('click', function () {
          scrollToBottom();
          chatJumpBtn.classList.remove('visible');
        });

        function sendChatMessage() {
          var text = chatInput.value.trim();
          if (!text) return;
          socket.emit('chat:send', { message: text, userId: window._chatUser && window._chatUser.id, username: window._chatUser && window._chatUser.username });
          chatInput.value = '';
        }

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') sendChatMessage();
        });

        // Fetch current user info for auth in chat:send
        window._chatUser = null;
        var _chatUserReady = false;
        fetch('/api/auth/me').then(function (r) {
          return r.ok ? r.json() : null;
        }).then(function (data) {
          if (data && data.user) window._chatUser = data.user;
          _chatUserReady = true;
          // Mark page as fully ready when both socket and user info are available
          if (document.body.getAttribute('data-socket-connected') === 'true') {
            document.body.setAttribute('data-socket-ready', 'true');
          }
        }).catch(function () {
          _chatUserReady = true;
          if (document.body.getAttribute('data-socket-connected') === 'true') {
            document.body.setAttribute('data-socket-ready', 'true');
          }
        });

        // ── Socket ──
        var socket = io(window.location.origin);
        window.__testSocket = socket;

        socket.on('connect', function () {
          socket.emit('presence:hello', { page: 'broadcast' });
        });

        socket.on('presence:update', function (data) {
          renderDrivers(data && data.drivers ? data.drivers : []);
        });

        socket.on('chat:history', function (data) {
          // Clear existing messages
          var msgs = chatMessages.querySelectorAll('.chat-msg');
          msgs.forEach(function (el) { el.remove(); });
          // Mark socket as connected
          document.body.setAttribute('data-socket-connected', 'true');
          // Mark ready only if user info is also loaded
          if (_chatUserReady) {
            document.body.setAttribute('data-socket-ready', 'true');
          }
          var history = Array.isArray(data) ? data : (data && data.messages ? data.messages : []);
          if (!history || history.length === 0) {
            chatEmpty.style.display = '';
            return;
          }
          chatEmpty.style.display = 'none';
          history.forEach(function (msg) { appendMessage(msg); });
          scrollToBottom();
        });

        socket.on('chat:message', function (msg) {
          appendMessage(msg);
        });

        socket.on('chat:deleted', function (data) {
          if (data && data.id != null) markDeleted(data.id);
        });

        socket.on('chat:error', function (err) {
          if (err && err.code === 'rate_limited') {
            chatInput.disabled = true;
            chatSendBtn.disabled = true;
            setTimeout(function () {
              chatInput.disabled = false;
              chatSendBtn.disabled = false;
              chatInput.focus();
            }, 1500);
          }
        });

        // ── Video stream player ──
        (function initVideoPlayer() {
          var vp = document.getElementById('broadcast-viewport');
          var placeholder = document.getElementById('stream-placeholder');

          fetch('/api/config/video').then(function (r) {
            return r.ok ? r.json() : null;
          }).then(function (cfg) {
            if (!cfg || !cfg.streamUrl) return; // No stream configured — keep placeholder

            // Hide placeholder
            placeholder.style.display = 'none';

            if (cfg.type === 'mjpeg') {
              var img = document.createElement('img');
              img.id = 'stream-img';
              img.src = cfg.streamUrl;
              img.alt = 'Трансляция';
              vp.insertBefore(img, vp.firstChild);
            } else {
              // HLS (or any other type defaults to HLS)
              var video = document.createElement('video');
              video.id = 'stream-video';
              video.autoplay = true;
              video.muted = true;
              video.controls = true;
              video.playsInline = true;

              if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS (Safari / iOS)
                video.src = cfg.streamUrl;
                vp.insertBefore(video, vp.firstChild);
              } else {
                // Load hls.js from CDN then initialise
                var script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
                script.onload = function () {
                  if (window.Hls && window.Hls.isSupported()) {
                    var hls = new window.Hls();
                    hls.loadSource(cfg.streamUrl);
                    hls.attachMedia(video);
                  } else {
                    // Fallback: try setting src directly
                    video.src = cfg.streamUrl;
                  }
                  vp.insertBefore(video, vp.firstChild);
                };
                script.onerror = function () {
                  // CDN unavailable — try native src as last resort
                  video.src = cfg.streamUrl;
                  vp.insertBefore(video, vp.firstChild);
                };
                document.head.appendChild(script);
              }
            }
          }).catch(function () {
            // Network error fetching config — keep placeholder
          });
        })();
      })();
    </script>


</body>
</html>
