<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-nav"><a href="/">← Главная</a></div>
    <div class="auth-card">
        <h1 class="auth-h1-compact">🔑 Восстановление пароля</h1>
        <p class="subtitle">Введите email вашего аккаунта, и мы пришлём ссылку для сброса пароля.</p>
        <form id="forgot-form" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="your@email.com"
                    autocomplete="email" maxlength="254"
                    aria-describedby="email-err">
                <div class="field-error" id="email-err" role="alert"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Отправить ссылку</span>
                <span class="spinner" id="btn-spinner"></span>
            </button>
        </form>
        <div class="success-box" id="success-box"></div>
        <div class="back-link"><a href="/login">← Вернуться ко входу</a></div>
    </div>

    <script src="js/forgot-password.js"></script>
</body>
</html>
