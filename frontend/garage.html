<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Гараж — Riley at the Rally</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            color: #fff;
        }

        /* 3D canvas fills the viewport */
        #garage-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* WebGL fallback */
        #webgl-fallback {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(180deg, #0a0e1a 0%, #1a2340 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        #webgl-fallback.active { display: flex; }
        #webgl-fallback .fallback-car { font-size: 96px; margin-bottom: 16px; }
        #webgl-fallback h2 { color: #fff; margin-bottom: 8px; }
        #webgl-fallback p { color: #aaa; font-size: 16px; line-height: 1.5; }
        #webgl-fallback .fallback-cta {
            margin-top: 24px;
            padding: 14px 48px;
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Loading spinner */
        .scene-loading {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #0a0e1a;
            transition: opacity 0.5s;
        }
        .scene-loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text { color: rgba(255,255,255,0.5); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Top HUD bar */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 20px 60px;
            background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }
        .top-bar > * { pointer-events: all; }

        /* Side menus */
        .menu-left, .menu-right {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            min-width: 140px;
            text-align: left;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.35);
        }

        /* CTA center area */
        .cta-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }
        .car-title {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .cta-btn {
            padding: 14px 44px;
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(229,57,53,0.5);
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .cta-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(229,57,53,0.7);
        }
        .cta-btn:active:not(:disabled) { transform: translateY(0); }
        .cta-btn:disabled {
            background: linear-gradient(135deg, #444 0%, #2a2a2a 100%);
            box-shadow: none;
            cursor: not-allowed;
        }
        .cta-btn.observer {
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            box-shadow: 0 4px 20px rgba(21,101,192,0.5);
        }
        .cta-btn.observer:hover:not(:disabled) {
            box-shadow: 0 6px 28px rgba(21,101,192,0.7);
        }

        /* Auth info chip top-right */
        .auth-chip {
            position: fixed;
            top: 14px; right: 14px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .auth-chip a {
            color: #64b5f6;
            text-decoration: none;
        }
        .auth-chip a:hover { text-decoration: underline; }

        /* Bottom carousel */
        .carousel-wrap {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 12px 20px 22px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }
        .carousel-label {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .carousel {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            padding: 4px 0 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .car-thumb {
            flex-shrink: 0;
            width: 72px; height: 72px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            gap: 5px;
        }
        .car-thumb.active {
            border-color: #fff;
            transform: scale(1.1);
        }
        .car-thumb:hover:not(.active) {
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }
        .thumb-dot {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .thumb-name {
            font-size: 10px;
            color: rgba(255,255,255,0.75);
        }

        /* Stale session overlay */
        .stale-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); z-index: 100;
            justify-content: center; align-items: center;
        }
        .stale-overlay.visible { display: flex; }
        .stale-card {
            background: #141c30; border-radius: 12px;
            padding: 36px 44px; text-align: center;
            max-width: 380px; width: 90%;
            box-shadow: 0 4px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stale-card h2 { margin-top: 0; color: #fff; }
        .stale-card p { font-size: 15px; color: #aaa; margin: 10px 0; }
        .stale-card .cost { font-size: 28px; font-weight: bold; color: #42a5f5; margin: 16px 0; }
        .stale-card .close-btn {
            display: inline-block; margin-top: 18px; padding: 12px 32px;
            background: #e53935; color: #fff; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; transition: background 0.2s;
        }
        .stale-card .close-btn:hover { background: #c62828; }

        /* Mobile */
        @media (max-width: 600px) {
            .menu-btn { min-width: 100px; padding: 8px 11px; font-size: 12px; }
            .cta-btn { padding: 11px 28px; font-size: 14px; }
            .car-title { font-size: 15px; }
            .top-bar { padding: 12px 10px 50px; }
            .car-thumb { width: 58px; height: 58px; }
            .thumb-dot { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <!-- Loading screen -->
    <div class="scene-loading" id="scene-loading">
        <div class="spinner"></div>
        <div class="loading-text">Загрузка гаража…</div>
    </div>

    <!-- WebGL fallback (shown when WebGL unavailable) -->
    <div id="webgl-fallback">
        <div class="fallback-car">🚗</div>
        <h2>3D-гараж недоступен</h2>
        <p>Ваш браузер не поддерживает WebGL.<br>Обновите браузер для полного 3D-опыта.</p>
        <button class="fallback-cta" id="fallback-cta-btn">Старт / Подключиться</button>
    </div>

    <!-- 3D Canvas -->
    <canvas id="garage-canvas"></canvas>

    <!-- Auth chip (top-right) -->
    <div class="auth-chip" id="auth-chip">…</div>

    <!-- Top HUD bar -->
    <div class="top-bar">
        <!-- Left menu -->
        <div class="menu-left">
            <button class="menu-btn" id="btn-leaderboard">🏆 Рейтинги</button>
            <button class="menu-btn" id="btn-profile">👤 Профиль</button>
        </div>

        <!-- CTA center -->
        <div class="cta-area">
            <div class="car-title" id="car-title">Riley-X1</div>
            <button class="cta-btn" id="cta-btn" disabled>Загрузка…</button>
        </div>

        <!-- Right menu -->
        <div class="menu-right">
            <button class="menu-btn" id="btn-lobby">🏠 Лобби</button>
            <button class="menu-btn" id="btn-control">🎮 Управление</button>
        </div>
    </div>

    <!-- Bottom carousel -->
    <div class="carousel-wrap">
        <div class="carousel-label">Выберите ливрею</div>
        <div class="carousel" id="car-carousel" role="listbox" aria-label="Выбор цвета машины"></div>
    </div>

    <!-- Stale session overlay -->
    <div class="stale-overlay" id="stale-overlay">
        <div class="stale-card">
            <h2>Сессия завершена</h2>
            <p id="stale-car">Машина: —</p>
            <p id="stale-duration">Длительность: —</p>
            <p class="cost" id="stale-cost">$0.00</p>
            <button class="close-btn" id="stale-close">Закрыть</button>
        </div>
    </div>

    <!-- Socket.io (served locally by the backend) -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Three.js 3D scene (ES module, local vendor files) -->
    <script type="importmap">
    {
        "imports": {
            "three": "/vendor/three.module.min.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from '/vendor/controls/OrbitControls.js';

        // ---- Car color variants ----
        const CAR_VARIANTS = [
            { name: 'Алый',    bodyHex: '#e53935', trimHex: '#ffffff', body: 0xe53935, trim: 0xffffff },
            { name: 'Синий',   bodyHex: '#1e88e5', trimHex: '#ffffff', body: 0x1e88e5, trim: 0xffffff },
            { name: 'Зелёный', bodyHex: '#43a047', trimHex: '#ffffff', body: 0x43a047, trim: 0xffffff },
            { name: 'Золотой', bodyHex: '#fdd835', trimHex: '#212121', body: 0xfdd835, trim: 0x212121 },
            { name: 'Чёрный',  bodyHex: '#1c1c1c', trimHex: '#e53935', body: 0x1c1c1c, trim: 0xe53935 },
        ];

        let activeVariant = 0;
        let carGroup = null;
        let scene, camera, renderer, controls;

        // ---- WebGL detection ----
        function hasWebGL() {
            try {
                const c = document.createElement('canvas');
                return !!(window.WebGLRenderingContext &&
                    (c.getContext('webgl') || c.getContext('experimental-webgl')));
            } catch (e) { return false; }
        }

        const forceFallback = new URLSearchParams(window.location.search).get('forceFallback') === '1';

        if (!hasWebGL() || forceFallback) {
            document.getElementById('webgl-fallback').classList.add('active');
            document.getElementById('scene-loading').classList.add('hidden');
            renderCarousel();
            document.getElementById('car-title').textContent = 'Riley-X1 · ' + CAR_VARIANTS[0].name;
        } else {
            initScene();
        }

        // ---- Scene setup ----
        function initScene() {
            const canvas = document.getElementById('garage-canvas');

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1525);
            scene.fog = new THREE.FogExp2(0x0d1525, 0.025);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2.8, 7);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.minDistance = 3;
            controls.maxDistance = 14;
            controls.maxPolarAngle = Math.PI / 2 - 0.04;
            controls.target.set(0, 0.5, 0);
            controls.update();

            addLighting();
            addEnvironment();

            carGroup = buildCar(CAR_VARIANTS[0].body, CAR_VARIANTS[0].trim);
            scene.add(carGroup);

            renderCarousel();

            window.addEventListener('resize', onResize);
            animate();

            setTimeout(() => {
                document.getElementById('scene-loading').classList.add('hidden');
            }, 300);
        }

        function addLighting() {
            // Ambient
            scene.add(new THREE.AmbientLight(0x6688aa, 0.55));

            // Key light (overhead front)
            const key = new THREE.DirectionalLight(0xffffff, 1.6);
            key.position.set(4, 9, 5);
            key.castShadow = true;
            key.shadow.mapSize.set(1024, 1024);
            key.shadow.camera.near = 0.5;
            key.shadow.camera.far = 30;
            key.shadow.camera.left = key.shadow.camera.bottom = -8;
            key.shadow.camera.right = key.shadow.camera.top = 8;
            scene.add(key);

            // Fill light
            const fill = new THREE.DirectionalLight(0x4466bb, 0.45);
            fill.position.set(-4, 4, -3);
            scene.add(fill);

            // Rim / back light
            const rim = new THREE.DirectionalLight(0xaaccff, 0.3);
            rim.position.set(0, 3, -7);
            scene.add(rim);

            // Overhead hangar spots
            [-4, 0, 4].forEach(x => {
                const spot = new THREE.SpotLight(0xffeedd, 0.7, 22, Math.PI / 7, 0.5);
                spot.position.set(x, 9, 0);
                spot.castShadow = false;
                const t = new THREE.Object3D();
                t.position.set(x, 0, 0);
                scene.add(t);
                spot.target = t;
                scene.add(spot);
                scene.add(t);
            });
        }

        function addEnvironment() {
            // Floor
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(60, 60),
                new THREE.MeshStandardMaterial({ color: 0x080d1a, roughness: 0.85, metalness: 0.3 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Grid overlay
            const grid = new THREE.GridHelper(60, 60, 0x1a2a4a, 0x141e30);
            grid.material.opacity = 0.45;
            grid.material.transparent = true;
            scene.add(grid);

            // Ceiling
            const ceil = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 30),
                new THREE.MeshStandardMaterial({ color: 0x050810, roughness: 1, side: THREE.BackSide })
            );
            ceil.position.y = 12;
            ceil.rotation.x = Math.PI / 2;
            scene.add(ceil);

            // Side walls (hangar feel)
            [[-12, 0], [12, Math.PI]].forEach(([x, ry]) => {
                const wall = new THREE.Mesh(
                    new THREE.PlaneGeometry(30, 14),
                    new THREE.MeshStandardMaterial({ color: 0x09101f, roughness: 1, side: THREE.BackSide })
                );
                wall.position.set(x, 6, 0);
                wall.rotation.y = ry + Math.PI / 2;
                scene.add(wall);
            });

            // Back wall
            const back = new THREE.Mesh(
                new THREE.PlaneGeometry(30, 14),
                new THREE.MeshStandardMaterial({ color: 0x09101f, roughness: 1, side: THREE.BackSide })
            );
            back.position.set(0, 6, -14);
            scene.add(back);

            // Accent lines on floor (runway feel)
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xe53935, opacity: 0.25, transparent: true });
            [-0.9, 0.9].forEach(x => {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.04, 8), lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(x, 0.001, 0);
                scene.add(line);
            });
        }

        // ---- Build procedural RC car ----
        function buildCar(bodyColor, trimColor) {
            const group = new THREE.Group();

            const mBody = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.25, metalness: 0.75 });
            const mTrim = new THREE.MeshStandardMaterial({ color: trimColor, roughness: 0.45, metalness: 0.4 });
            const mBlack = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.85, metalness: 0.1 });
            const mGlass = new THREE.MeshStandardMaterial({ color: 0x6699bb, roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.65 });
            const mChrome = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.1, metalness: 0.95 });
            const mLight  = new THREE.MeshStandardMaterial({ color: 0xffffee, emissive: 0xffffcc, emissiveIntensity: 0.6 });
            const mTail   = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 0.7 });

            function mesh(geo, mat, x, y, z, rx, ry, rz) {
                const m = new THREE.Mesh(geo, mat);
                m.position.set(x || 0, y || 0, z || 0);
                if (rx) m.rotation.x = rx;
                if (ry) m.rotation.y = ry;
                if (rz) m.rotation.z = rz;
                m.castShadow = true;
                group.add(m);
                return m;
            }

            // Body chassis
            mesh(new THREE.BoxGeometry(1.82, 0.44, 3.7), mBody, 0, 0.5, 0);
            // Cabin/roof
            mesh(new THREE.BoxGeometry(1.32, 0.42, 1.65), mBody, 0, 0.93, -0.08);
            // Windshield
            mesh(new THREE.BoxGeometry(1.14, 0.36, 0.06), mGlass, 0, 0.88, 0.75, 0.3);
            // Rear window
            mesh(new THREE.BoxGeometry(1.14, 0.3,  0.06), mGlass, 0, 0.86, -0.91, -0.3);
            // Front bumper
            mesh(new THREE.BoxGeometry(1.72, 0.22, 0.14), mTrim, 0, 0.3,  1.88);
            // Rear bumper
            mesh(new THREE.BoxGeometry(1.72, 0.22, 0.14), mTrim, 0, 0.3, -1.88);
            // Spoiler blade
            mesh(new THREE.BoxGeometry(1.62, 0.06, 0.26), mTrim, 0, 1.08, -1.82);
            // Spoiler legs
            [-0.76, 0.76].forEach(x => mesh(new THREE.BoxGeometry(0.05, 0.3, 0.08), mTrim, x, 0.92, -1.77));
            // Headlights
            [-0.67, 0.67].forEach(x => mesh(new THREE.BoxGeometry(0.26, 0.13, 0.05), mLight, x, 0.6, 1.85));
            // Taillights
            [-0.67, 0.67].forEach(x => mesh(new THREE.BoxGeometry(0.32, 0.11, 0.05), mTail, x, 0.5, -1.86));
            // Side skirts
            [-0.92, 0.92].forEach(x => mesh(new THREE.BoxGeometry(0.08, 0.12, 3.2), mTrim, x, 0.28, 0));

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.33, 0.33, 0.22, 24);
            const hubGeo   = new THREE.CylinderGeometry(0.15, 0.15, 0.24, 18);
            [
                { x: -1.02, z:  1.12 },
                { x:  1.02, z:  1.12 },
                { x: -1.02, z: -1.12 },
                { x:  1.02, z: -1.12 },
            ].forEach(({ x, z }) => {
                const tire = new THREE.Mesh(wheelGeo, mBlack);
                tire.rotation.z = Math.PI / 2;
                tire.position.set(x, 0.33, z);
                tire.castShadow = true;
                group.add(tire);

                const hub = new THREE.Mesh(hubGeo, mChrome);
                hub.rotation.z = Math.PI / 2;
                hub.position.set(x, 0.33, z);
                group.add(hub);
            });

            // Rotate to face camera
            group.rotation.y = Math.PI;
            return group;
        }

        // ---- Swap color variant ----
        function swapVariant(index) {
            activeVariant = index;
            const v = CAR_VARIANTS[index];

            document.querySelectorAll('.car-thumb').forEach((el, i) =>
                el.classList.toggle('active', i === index)
            );
            document.getElementById('car-title').textContent = 'Riley-X1 · ' + v.name;

            if (!scene || !renderer) return;

            scene.remove(carGroup);
            carGroup = buildCar(v.body, v.trim);
            scene.add(carGroup);
        }

        // ---- Render carousel ----
        function renderCarousel() {
            const el = document.getElementById('car-carousel');
            el.innerHTML = '';
            CAR_VARIANTS.forEach((v, i) => {
                const thumb = document.createElement('div');
                thumb.className = 'car-thumb' + (i === 0 ? ' active' : '');
                thumb.setAttribute('role', 'option');
                thumb.setAttribute('aria-label', v.name);
                thumb.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
                thumb.title = v.name;
                thumb.innerHTML =
                    '<div class="thumb-dot" style="background:' + v.bodyHex + '"></div>' +
                    '<div class="thumb-name">' + v.name + '</div>';
                thumb.addEventListener('click', () => swapVariant(i));
                el.appendChild(thumb);
            });
        }

        // ---- Animation loop ----
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            // Gentle idle rotation
            if (carGroup) carGroup.rotation.y += 0.0015;
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>

    <!-- Auth + Socket + CTA logic (non-module, runs synchronously) -->
    <script>
        var socket = io(window.location.origin);
        var currentUser = null;
        var ratePerMinute = 0.50;
        var availableCars = [];

        // Navigation helpers
        document.getElementById('btn-leaderboard').addEventListener('click', function () {
            window.location.href = '/#leaderboard-section';
        });
        document.getElementById('btn-profile').addEventListener('click', function () {
            window.location.href = '/profile';
        });
        document.getElementById('btn-lobby').addEventListener('click', function () {
            window.location.href = '/';
        });
        document.getElementById('btn-control').addEventListener('click', function () {
            window.location.href = '/control';
        });

        // Auth state
        function loadAuth() {
            fetch('/api/auth/me')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    currentUser = data.user || null;
                    renderAuthChip();
                    updateCTA();
                })
                .catch(function () {
                    currentUser = null;
                    renderAuthChip();
                    updateCTA();
                });
        }

        function renderAuthChip() {
            var el = document.getElementById('auth-chip');
            if (currentUser) {
                var span = document.createTextNode('👤 ' + currentUser.username + ' · ');
                var a = document.createElement('a');
                a.href = '/profile';
                a.textContent = 'Профиль';
                el.innerHTML = '';
                el.appendChild(span);
                el.appendChild(a);
            } else {
                el.innerHTML = '<a href="/login">Войти</a> · <a href="/register">Регистрация</a>';
            }
        }

        function updateCTA() {
            var btn = document.getElementById('cta-btn');
            var fallbackBtn = document.getElementById('fallback-cta-btn');

            if (!currentUser) {
                btn.textContent = 'Только просмотр / Войти';
                btn.className = 'cta-btn observer';
                btn.disabled = false;
                btn.onclick = function () { window.location.href = '/login?redirect=/garage'; };

                if (fallbackBtn) {
                    fallbackBtn.textContent = 'Войти';
                    fallbackBtn.onclick = function () { window.location.href = '/login?redirect=/garage'; };
                }
            } else if (currentUser.status === 'pending') {
                btn.textContent = 'Подтвердите email';
                btn.className = 'cta-btn';
                btn.disabled = false;
                btn.onclick = function () { window.location.href = '/verify-email'; };

                if (fallbackBtn) {
                    fallbackBtn.textContent = 'Подтвердите email';
                    fallbackBtn.onclick = function () { window.location.href = '/verify-email'; };
                }
            } else {
                btn.textContent = 'Старт / Подключиться';
                btn.className = 'cta-btn';
                btn.disabled = false;
                btn.onclick = startSession;

                if (fallbackBtn) {
                    fallbackBtn.textContent = 'Старт / Подключиться';
                    fallbackBtn.onclick = startSession;
                }
            }
        }

        // Load available cars
        function loadCars() {
            fetch('/api/cars')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    ratePerMinute = data.ratePerMinute || ratePerMinute;
                    availableCars = (data.cars || []).filter(function (c) { return c.status === 'available'; });
                })
                .catch(function () {});
        }

        socket.on('cars_updated', function (data) {
            availableCars = (data.cars || []).filter(function (c) { return c.status === 'available'; });
        });

        // Start session
        function startSession() {
            if (!currentUser) {
                window.location.href = '/login?redirect=/garage';
                return;
            }
            if (availableCars.length === 0) {
                alert('Нет доступных машин. Попробуйте позже.');
                loadCars();
                return;
            }
            var btn = document.getElementById('cta-btn');
            btn.disabled = true;
            btn.textContent = 'Запуск…';

            var car = availableCars[0];
            var selectedRace = sessionStorage.getItem('selectedRaceId') || null;

            socket.emit('start_session', {
                carId: car.id,
                userId: currentUser.username,
                dbUserId: currentUser.id
            });

            socket.once('session_started', function (data) {
                sessionStorage.setItem('activeSession', JSON.stringify({
                    carId: car.id,
                    carName: car.name,
                    startTime: new Date().toISOString(),
                    sessionId: data.sessionId,
                    userId: currentUser.username,
                    dbUserId: currentUser.id,
                    ratePerMinute: ratePerMinute,
                    selectedRaceId: selectedRace
                }));
                window.location.href = '/control';
            });

            socket.once('session_error', function (data) {
                alert(data.message || 'Не удалось начать сессию.');
                btn.disabled = false;
                updateCTA();
                loadCars();
            });
        }

        // Stale session check (same pattern as index.html)
        function checkStaleSession() {
            var stale = null;
            try { stale = JSON.parse(sessionStorage.getItem('activeSession') || 'null'); } catch (e) {}
            if (!stale || !stale.sessionId) { sessionStorage.removeItem('activeSession'); return; }
            sessionStorage.removeItem('activeSession');
            fetch('/api/session/end', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId: stale.sessionId })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                var carName = stale.carName || ('Машина #' + (stale.carId || '?'));
                var durationText = '—', costText = '$0.00';
                if (data.ended) {
                    var sec = data.durationSeconds || 0;
                    durationText = Math.floor(sec / 60) + 'м ' + (sec % 60) + 'с';
                    costText = '$' + (data.cost || 0).toFixed(2);
                } else if (stale.startTime) {
                    var sec2 = Math.max(0, Math.floor((Date.now() - new Date(stale.startTime).getTime()) / 1000));
                    durationText = Math.floor(sec2 / 60) + 'м ' + (sec2 % 60) + 'с';
                    costText = '$' + ((sec2 / 60) * (stale.ratePerMinute || ratePerMinute)).toFixed(2);
                }
                document.getElementById('stale-car').textContent = 'Машина: ' + carName;
                document.getElementById('stale-duration').textContent = 'Длительность: ' + durationText;
                document.getElementById('stale-cost').textContent = costText;
                document.getElementById('stale-overlay').classList.add('visible');
            })
            .catch(function () {});
        }

        document.getElementById('stale-close').addEventListener('click', function () {
            document.getElementById('stale-overlay').classList.remove('visible');
        });

        window.addEventListener('pageshow', function (e) {
            if (e.persisted) checkStaleSession();
        });

        // Init
        loadAuth();
        loadCars();
        checkStaleSession();
    </script>
</body>
</html>
