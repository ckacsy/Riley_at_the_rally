<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи — Админ — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <style>
        body { background: #0a0e1a; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
        .admin-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .admin-header h1 { font-size: 24px; font-weight: bold; flex: 1; }
        .admin-back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
        .admin-back:hover { color: #fff; }

        .admin-toolbar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .admin-search {
            flex: 1; min-width: 200px; padding: 8px 12px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: #fff; font-size: 14px;
        }
        .admin-search::placeholder { color: rgba(255,255,255,0.4); }
        .admin-search:focus { outline: none; border-color: rgba(255,255,255,0.3); }

        #flash-container { margin-bottom: 16px; }
        .admin-flash { padding: 12px 16px; border-radius: 8px; font-size: 14px; }
        .admin-flash--success { background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #4caf50; }
        .admin-flash--error   { background: rgba(229,57,53,0.2);  border: 1px solid #e53935; color: #e53935; }
        .admin-flash--info    { background: rgba(100,181,246,0.2); border: 1px solid #64b5f6; color: #64b5f6; }

        .admin-table-wrap { overflow-x: auto; }
        table {
            width: 100%; border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 10px; overflow: hidden;
        }
        th { padding: 12px 14px; text-align: left; font-size: 12px; text-transform: uppercase;
             color: rgba(255,255,255,0.5); border-bottom: 1px solid rgba(255,255,255,0.08); }
        td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.03); }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 12px;
            font-size: 12px; font-weight: bold; white-space: nowrap;
        }
        .badge-role--admin     { background: rgba(229,57,53,0.25);  color: #ef9a9a; }
        .badge-role--moderator { background: rgba(100,181,246,0.25); color: #90caf9; }
        .badge-role--user      { background: rgba(255,255,255,0.1);  color: #ccc; }
        .badge-status--active  { background: rgba(76,175,80,0.25);   color: #a5d6a7; }
        .badge-status--banned  { background: rgba(229,57,53,0.25);   color: #ef9a9a; }
        .badge-status--pending { background: rgba(255,193,7,0.25);   color: #ffe082; }
        .badge-status--deleted { background: rgba(255,255,255,0.07); color: #888; }

        .actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-sm {
            padding: 5px 10px; border: none; border-radius: 6px;
            font-size: 12px; font-weight: bold; cursor: pointer; transition: opacity 0.15s;
        }
        .btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-ban    { background: rgba(229,57,53,0.3);   color: #ef9a9a; }
        .btn-unban  { background: rgba(76,175,80,0.3);   color: #a5d6a7; }
        .btn-adjust { background: rgba(100,181,246,0.3); color: #90caf9; }
        .btn-compensation { background: rgba(168,85,247,0.3); color: #d8b4fe; }
        .btn-delete { background: rgba(229,57,53,0.15);  color: #e57373; border: 1px solid rgba(229,57,53,0.3); }
        .btn-sm:hover:not(:disabled) { opacity: 0.8; }

        .state-msg {
            text-align: center; padding: 40px 20px;
            color: rgba(255,255,255,0.5); font-size: 16px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-backdrop[hidden] { display: none; }
        .modal {
            background: #151b2e; border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 28px; width: 380px; max-width: 95vw;
        }
        .modal h2 { font-size: 18px; margin-bottom: 16px; }
        .modal-field { margin-bottom: 14px; }
        .modal-field label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        .modal-field input {
            width: 100%; padding: 8px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 14px;
        }
        .modal-field input:focus { outline: none; border-color: rgba(255,255,255,0.3); }
        .modal-field select {
            appearance: none; width: 100%; padding: 8px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 14px;
        }
        .modal-field select:focus { outline: none; border-color: rgba(255,255,255,0.3); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-modal-cancel {
            padding: 8px 18px; border-radius: 8px;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 14px; cursor: pointer;
        }
        .btn-modal-submit {
            padding: 8px 18px; border-radius: 8px;
            background: linear-gradient(135deg, #e53935, #c62828);
            border: none; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .btn-modal-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        #modal-flash { margin-bottom: 12px; }
        #comp-flash { margin-bottom: 12px; }
        .modal-desc {
            font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 14px;
        }

        [hidden] { display: none !important; }
        #admin-loading {
            position: fixed; inset: 0; background: #0a0e1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
<div id="main-nav"></div>
<div id="admin-loading">Загрузка…</div>

<div class="admin-container" id="admin-content" hidden>
    <div class="admin-header">
        <a href="/admin" class="admin-back">← Назад</a>
        <h1>👥 Пользователи</h1>
    </div>

    <div id="flash-container"></div>

    <div class="admin-toolbar">
        <input type="search" id="user-search" class="admin-search"
               placeholder="Поиск по имени или email…" autocomplete="off">
    </div>

    <div class="admin-table-wrap">
        <div id="users-state" class="state-msg" hidden></div>
        <table id="users-table" hidden>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Баланс</th>
                    <th>Создан</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
        </table>
    </div>
</div>

<!-- Balance Adjust Modal -->
<div class="modal-backdrop" id="modal-adjust" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-adjust-title">
        <h2 id="modal-adjust-title">Корректировка баланса</h2>
        <div id="modal-flash"></div>
        <div class="modal-field">
            <label for="adjust-amount">Сумма (отрицательная — списание)</label>
            <input type="number" id="adjust-amount" placeholder="например, 100 или -50" step="1">
        </div>
        <div class="modal-field">
            <label for="adjust-comment">Комментарий</label>
            <input type="text" id="adjust-comment" placeholder="Причина корректировки">
        </div>
        <input type="hidden" id="adjust-idempotency-key">
        <input type="hidden" id="adjust-user-id">
        <div class="modal-actions">
            <button class="btn-modal-cancel" id="modal-adjust-cancel">Отмена</button>
            <button class="btn-modal-submit" id="modal-adjust-submit">Применить</button>
        </div>
    </div>
</div>

<!-- Compensation Modal -->
<div class="modal-backdrop" id="modal-compensation" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-comp-title">
        <h2 id="modal-comp-title">Начисление компенсации</h2>
        <div id="comp-flash"></div>
        <p class="modal-desc">
            Средства будут зачислены на внутренний баланс пользователя
        </p>
        <div class="modal-field">
            <label for="comp-amount">Сумма (только положительная)</label>
            <input type="number" id="comp-amount" placeholder="например, 100" step="1" min="1">
        </div>
        <div class="modal-field">
            <label for="comp-reason">Причина</label>
            <select id="comp-reason">
                <option value="">— Выберите причину —</option>
                <option value="service_issue">Проблема с сервисом</option>
                <option value="billing_error">Ошибка биллинга</option>
                <option value="goodwill_credit">Жест доброй воли</option>
                <option value="session_interruption">Прерывание сессии</option>
            </select>
        </div>
        <div class="modal-field">
            <label for="comp-note">Примечание (необязательно)</label>
            <input type="text" id="comp-note" placeholder="Детали компенсации" maxlength="500">
        </div>
        <input type="hidden" id="comp-idempotency-key">
        <input type="hidden" id="comp-user-id">
        <div class="modal-actions">
            <button class="btn-modal-cancel" id="modal-comp-cancel">Отмена</button>
            <button class="btn-modal-submit" id="modal-comp-submit">Начислить</button>
        </div>
    </div>
</div>

<script src="js/nav.js"></script>
<script src="js/admin-api.js"></script>
<script src="js/admin-ui.js"></script>
<script src="js/admin-users.js"></script>
</body>
</html>
