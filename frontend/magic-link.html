<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход через email — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-nav"><a href="/">← Главная</a></div>
    <div class="auth-card">
        <h1 class="auth-h1-tight">🏎️ Вход через email</h1>
        <p class="subtitle">Введите ваш email — мы пришлём ссылку для входа. Регистрация происходит автоматически.</p>

        <div class="error-box error-box--compact" id="error-box"></div>

        <form id="magic-form" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="your@email.com"
                    autocomplete="email" maxlength="254"
                    aria-describedby="email-err">
                <div class="field-error" id="email-err" role="alert"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Отправить ссылку</span>
                <span class="spinner" id="btn-spinner"></span>
            </button>
        </form>

        <div class="success-box success-box--wide" id="success-box">
            📧 Ссылка отправлена! Проверьте почту и перейдите по ссылке для входа. Ссылка действительна 15 минут.
        </div>

        <div class="links">Предпочитаете пароль? <a href="/login">Войти с паролем</a></div>
    </div>

    <script src="js/magic-link.js"></script>
</body>
</html>
