<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
    <div class="auth-nav"><a href="/">← Главная</a></div>
    <div class="auth-card">
        <h1>🏎️ Вход</h1>
        <div class="magic-link-banner">✨ <a href="/magic-link">Войти через email-ссылку (без пароля)</a></div>
        <div class="error-banner" id="error-banner"></div>
        <form id="login-form" novalidate autocomplete="on">

            <div class="form-group">
                <label for="identifier">Имя пользователя или Email</label>
                <input type="text" id="identifier" name="identifier"
                    placeholder="username или your@email.com"
                    autocomplete="username" maxlength="254"
                    aria-describedby="identifier-err">
                <div class="field-error" id="identifier-err" role="alert"></div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password"
                        placeholder="Ваш пароль"
                        autocomplete="current-password" maxlength="128"
                        aria-describedby="password-err">
                    <button type="button" class="toggle-pw" aria-label="Показать/скрыть пароль" data-target="password">👁</button>
                </div>
                <div class="field-error" id="password-err" role="alert"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Войти</span>
                <span class="spinner" id="btn-spinner"></span>
            </button>
            <div class="lockout-msg" id="lockout-msg"></div>
            <div class="success-msg" id="success-msg"></div>
        </form>
        <div class="register-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
        <div class="register-link"><a href="/forgot-password">Забыли пароль?</a></div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
