<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/rank.css">
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>
    <div id="main-nav"></div>

    <div id="loading" class="loading-msg">Загрузка профиля…</div>
    <div id="error" class="error-msg" style="display:none"></div>
    <div id="pending-banner" class="pending-banner" style="display:none">
        <div class="pending-banner-icon">📧</div>
        <div class="pending-banner-text">
            <strong>Подтвердите ваш email</strong>
            <span>Ваш аккаунт ожидает подтверждения. Проверьте почту и перейдите по ссылке из письма.</span>
        </div>
        <div class="pending-banner-actions">
            <button class="resend-btn" id="resend-btn">Отправить повторно</button>
        </div>
    </div>
    <div id="profile-content" style="display:none">

        <!-- Profile header -->
        <div class="profile-header">
            <div class="avatar-wrap">
                <div id="avatar-container">
                    <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
                </div>
                <label class="avatar-upload-label" for="avatar-input">Загрузить фото</label>
                <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="upload-status" id="upload-status"></div>
            </div>
            <div class="profile-info">
                <div class="profile-username-row">
                    <div class="profile-username" id="profile-username">—</div>
                    <button class="username-edit-btn" id="username-edit-btn" title="Изменить имя пользователя">✏️</button>
                </div>
                <div class="username-edit-form" id="username-edit-form">
                    <input type="text" class="username-edit-input" id="username-edit-input" maxlength="30" autocomplete="off" />
                    <button class="username-save-btn" id="username-save-btn">Сохранить</button>
                    <button class="username-cancel-btn" id="username-cancel-btn">Отмена</button>
                </div>
                <div class="username-msg" id="username-msg" style="display:none;"></div>
                <div class="profile-email" id="profile-email">—</div>
                <div class="profile-joined" id="profile-joined">—</div>
                <div class="profile-balance" id="profile-balance">Баланс: — RC</div>
                <button class="logout-btn" id="logout-btn" style="margin-top:12px;">Выйти</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-section">
            <div class="section-title">📊 Статистика</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-sessions">—</div>
                    <div class="stat-label">Сессий аренды</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-races">—</div>
                    <div class="stat-label">Гонок участвовал</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-laps">—</div>
                    <div class="stat-label">Кругов завершено</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-time">—</div>
                    <div class="stat-label">Часов за рулём</div>
                </div>
            </div>
        </div>

        <!-- Rank block -->
        <div id="rank-section" class="rank-section" style="display:none">
            <div class="rank-section-title">🎖 Ранговый рейтинг</div>
            <div id="rank-block-content">
                <div class="rank-badge rank-badge-loading">Загрузка…</div>
            </div>
        </div>

        <!-- Best lap -->
        <div id="best-lap-section"></div>
        <!-- Recent laps -->
        <div class="recent-section">
            <div class="section-title">🕓 Последние круги</div>
            <div id="recent-laps-container"></div>
        </div>

        <!-- Transaction History -->
        <div class="transactions-section" style="max-width:860px;margin:0 auto 40px;">
            <button class="transactions-toggle" id="transactions-toggle">
                💳 Информация о транзакциях ▶
            </button>
            <div class="transactions-content" id="transactions-content" style="display:none;">
                <div id="transactions-container">
                    <p style="text-align:center;color:var(--text-secondary);">Загрузка...</p>
                </div>
            </div>
        </div>

    </div>

    <script src="js/escape-html.js"></script>
    <script src="js/rank-ui.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
