<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nav.css">
    <style>
        body {
            margin: 0;
            padding: calc(var(--nav-height, 44px) + 20px) 20px 20px;
        }
        .logout-btn {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.35);
            color: #ef9a9a;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .logout-btn:hover {
            background: rgba(244, 67, 54, 0.28);
            color: #fff;
            border-color: rgba(244, 67, 54, 0.6);
        }
        /* Profile header */
        .profile-header {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.35);
            padding: 32px;
            max-width: 860px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-secondary);
            background-color: rgba(255,255,255,0.08);
            display: block;
            box-shadow: 0 0 16px rgba(100, 181, 246, 0.35);
        }
        .avatar-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.08);
            border: 3px solid var(--accent-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 16px rgba(100, 181, 246, 0.35);
        }
        .avatar-upload-label {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: var(--accent-secondary);
            cursor: pointer;
            text-decoration: underline;
        }
        #avatar-input { display: none; }
        .profile-info { flex: 1; min-width: 200px; }
        .profile-username-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 6px;
        }
        .profile-username {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-primary);
            margin: 0;
        }
        .username-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-secondary);
            padding: 2px 4px;
            border-radius: 4px;
            line-height: 1;
            transition: color 0.2s;
        }
        .username-edit-btn:hover { color: var(--text-primary); }
        .username-edit-form {
            display: none;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 0 0 6px;
        }
        .username-edit-form.visible { display: flex; }
        .username-edit-input {
            font-size: 20px;
            font-weight: bold;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-card);
            color: var(--text-primary);
            min-width: 140px;
        }
        .username-save-btn, .username-cancel-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        .username-save-btn { background: var(--accent-secondary); color: var(--text-primary); }
        .username-cancel-btn { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        .username-msg {
            font-size: 13px;
            margin: 0 0 6px;
        }
        .username-msg.success { color: #4caf50; }
        .username-msg.error { color: #f44336; }
        .profile-email {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 8px;
        }
        .profile-joined {
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0.75;
        }
        /* Stats grid */
        .stats-section {
            max-width: 860px;
            margin: 0 auto 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 14px;
        }
        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            padding: 20px 24px;
            flex: 1;
            min-width: 160px;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-secondary);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }
        /* Best lap card */
        .best-lap-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            padding: 24px 32px;
            max-width: 860px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .best-lap-icon { font-size: 48px; }
        .best-lap-info { flex: 1; }
        .best-lap-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .best-lap-time {
            font-size: 36px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 1px 6px rgba(255,215,0,0.3);
        }
        .best-lap-car {
            font-size: 15px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .best-lap-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            opacity: 0.7;
        }
        .no-data-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            padding: 24px;
            max-width: 860px;
            margin: 0 auto 24px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 15px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        /* Recent laps table */
        .recent-section {
            max-width: 860px;
            margin: 0 auto 40px;
        }
        .laps-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            border: 1px solid var(--border-color);
        }
        .laps-table th {
            background-color: rgba(229, 57, 53, 0.22);
            color: var(--text-primary);
            padding: 10px 14px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .laps-table td {
            padding: 10px 14px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
        }
        .laps-table tr:last-child td { border-bottom: none; }
        .laps-table tr:nth-child(odd) td { background-color: rgba(255,255,255,0.03); }
        .laps-table tr:hover td { background-color: rgba(255,255,255,0.07); transition: background 0.15s; }
        .best-badge {
            background: #FFD700;
            color: #111;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: 6px;
        }
        /* Loading / error states */
        .loading-msg, .error-msg {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: var(--text-secondary);
        }
        .error-msg { color: var(--accent-danger); }
        .upload-status {
            font-size: 12px;
            text-align: center;
            margin-top: 4px;
            min-height: 16px;
            color: var(--accent-success);
        }
        .pending-banner {
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.35);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 860px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .pending-banner-icon { font-size: 28px; }
        .pending-banner-text { flex: 1; }
        .pending-banner-text strong { display: block; color: #ffc107; margin-bottom: 4px; }
        .pending-banner-text span { color: rgba(255, 193, 7, 0.8); font-size: 13px; }
        .pending-banner-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .resend-btn { padding: 8px 16px; background: rgba(255, 193, 7, 0.15); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.4); border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; min-height: 36px; transition: background 0.2s; }
        .resend-btn:hover { background: rgba(255, 193, 7, 0.3); }
        .resend-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        /* Responsive */
        @media (max-width: 600px) {
            body { padding: calc(var(--nav-height, 44px) + 12px) 12px 12px; }
            .profile-header { padding: 20px; gap: 20px; }
            .best-lap-card { padding: 16px 20px; }
            .profile-username { font-size: 22px; }
            .stat-value { font-size: 26px; }
            .best-lap-time { font-size: 28px; }
        }
        /* Balance on profile */
        .profile-balance {
            font-size: 14px;
            color: #42a5f5;
            font-weight: bold;
            margin: 4px 0 8px;
        }
        /* Transaction history */
        .transactions-section { padding: 0 16px; }
        .transactions-toggle {
            width: 100%; text-align: left; padding: 14px 18px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--text-primary); font-size: 16px;
            font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .transactions-toggle:hover { background: rgba(255,255,255,0.07); }
        .transactions-content {
            margin-top: 8px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 10px; padding: 16px; overflow-x: auto;
        }
        .tx-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tx-table th {
            text-align: left; padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary); font-weight: 600; white-space: nowrap;
        }
        .tx-table td {
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-primary); vertical-align: middle;
        }
        .tx-table tr:last-child td { border-bottom: none; }
        .tx-table tr:nth-child(odd) td { background-color: rgba(255,255,255,0.02); }
        .tx-table tr:hover td { background-color: rgba(255,255,255,0.06); }
        .tx-type-topup  { color: #66bb6a; font-weight: bold; }
        .tx-type-hold   { color: #ffa726; font-weight: bold; }
        .tx-type-deduct { color: #ef5350; font-weight: bold; }
        .tx-type-release{ color: #42a5f5; font-weight: bold; }
        .tx-type-bonus  { color: #ffd54f; font-weight: bold; }
        .tx-amount-pos { color: #66bb6a; }
        .tx-amount-neg { color: #ef5350; }
    </style>
</head>
<body>
    <div id="main-nav"></div>

    <div id="loading" class="loading-msg">Загрузка профиля…</div>
    <div id="error" class="error-msg" style="display:none"></div>
    <div id="pending-banner" class="pending-banner" style="display:none">
        <div class="pending-banner-icon">📧</div>
        <div class="pending-banner-text">
            <strong>Подтвердите ваш email</strong>
            <span>Ваш аккаунт ожидает подтверждения. Проверьте почту и перейдите по ссылке из письма.</span>
        </div>
        <div class="pending-banner-actions">
            <button class="resend-btn" id="resend-btn">Отправить повторно</button>
        </div>
    </div>
    <div id="profile-content" style="display:none">

        <!-- Profile header -->
        <div class="profile-header">
            <div class="avatar-wrap">
                <div id="avatar-container">
                    <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
                </div>
                <label class="avatar-upload-label" for="avatar-input">Загрузить фото</label>
                <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="upload-status" id="upload-status"></div>
            </div>
            <div class="profile-info">
                <div class="profile-username-row">
                    <div class="profile-username" id="profile-username">—</div>
                    <button class="username-edit-btn" id="username-edit-btn" title="Изменить имя пользователя">✏️</button>
                </div>
                <div class="username-edit-form" id="username-edit-form">
                    <input type="text" class="username-edit-input" id="username-edit-input" maxlength="30" autocomplete="off" />
                    <button class="username-save-btn" id="username-save-btn">Сохранить</button>
                    <button class="username-cancel-btn" id="username-cancel-btn">Отмена</button>
                </div>
                <div class="username-msg" id="username-msg" style="display:none;"></div>
                <div class="profile-email" id="profile-email">—</div>
                <div class="profile-joined" id="profile-joined">—</div>
                <div class="profile-balance" id="profile-balance">Баланс: — RC</div>
                <button class="logout-btn" id="logout-btn" style="margin-top:12px;">Выйти</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-section">
            <div class="section-title">📊 Статистика</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-sessions">—</div>
                    <div class="stat-label">Сессий аренды</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-races">—</div>
                    <div class="stat-label">Гонок участвовал</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-laps">—</div>
                    <div class="stat-label">Кругов завершено</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-time">—</div>
                    <div class="stat-label">Часов за рулём</div>
                </div>
            </div>
        </div>

        <!-- Best lap -->
        <div id="best-lap-section"></div>

        <!-- Recent laps -->
        <div class="recent-section">
            <div class="section-title">🕓 Последние круги</div>
            <div id="recent-laps-container"></div>
        </div>

        <!-- Transaction History -->
        <div class="transactions-section" style="max-width:860px;margin:0 auto 40px;">
            <button class="transactions-toggle" id="transactions-toggle">
                💳 Информация о транзакциях ▶
            </button>
            <div class="transactions-content" id="transactions-content" style="display:none;">
                <div id="transactions-container">
                    <p style="text-align:center;color:var(--text-secondary);">Загрузка...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        var csrfToken = '';
        fetch('/api/csrf-token', { credentials: 'same-origin' }).then(function(r){return r.json();}).then(function(d){csrfToken=d.csrfToken||'';});

        function formatLapTime(ms) {
            const mins = String(Math.floor(ms / 60000)).padStart(2, '0');
            const secs = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
            const millis = String(ms % 1000).padStart(3, '0');
            return mins + ':' + secs + '.' + millis;
        }

        function formatDuration(totalSec) {
            const h = (totalSec / 3600).toFixed(1);
            return h;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            return new Date(dateStr).toLocaleDateString('ru-RU', {
                year: 'numeric', month: 'short', day: 'numeric',
            });
        }

        function esc(str) {
            if (str == null) return '—';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function loadProfile() {
            fetch('/api/profile', { credentials: 'same-origin' })
                .then(function (res) {
                    if (res.status === 401) {
                        window.location.href = '/login?redirect=/profile';
                        return null;
                    }
                    return res.json();
                })
                .then(function (data) {
                    if (!data) return;
                    if (data.error) {
                        document.getElementById('loading').style.display = 'none';
                        const errEl = document.getElementById('error');
                        errEl.textContent = data.error;
                        errEl.style.display = 'block';
                        return;
                    }
                    renderProfile(data);
                })
                .catch(function () {
                    document.getElementById('loading').style.display = 'none';
                    const errEl = document.getElementById('error');
                    errEl.textContent = 'Не удалось загрузить профиль.';
                    errEl.style.display = 'block';
                });
        }

        function renderProfile(data) {
            const { user, stats } = data;

            // Show pending banner if account not active
            if (user.status === 'pending') {
                document.getElementById('pending-banner').style.display = 'flex';
            }

            // Avatar
            if (user.avatar_path) {
                const img = document.createElement('img');
                img.className = 'avatar-img';
                img.src = user.avatar_path;
                img.alt = 'Аватар';
                const container = document.getElementById('avatar-container');
                const placeholder = document.getElementById('avatar-placeholder');
                if (placeholder) {
                    container.replaceChild(img, placeholder);
                } else {
                    container.innerHTML = '';
                    container.appendChild(img);
                }
            }

            // Profile info
            currentUsername = user.username;
            document.getElementById('profile-username').textContent = user.username;
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-joined').textContent = 'Участник с ' + formatDate(user.created_at);

            // Stats
            document.getElementById('stat-sessions').textContent = stats.totalSessions;
            document.getElementById('stat-races').textContent = stats.totalRaces;
            document.getElementById('stat-laps').textContent = stats.totalLaps;
            document.getElementById('stat-time').textContent = formatDuration(stats.totalTimeSec);

            // Best lap
            const bestSection = document.getElementById('best-lap-section');
            if (stats.bestLap) {
                bestSection.innerHTML = '<div class="best-lap-card">' +
                    '<div class="best-lap-icon">🏆</div>' +
                    '<div class="best-lap-info">' +
                    '<div class="best-lap-title">Лучший круг</div>' +
                    '<div class="best-lap-time">' + formatLapTime(stats.bestLap.lap_time_ms) + '</div>' +
                    '<div class="best-lap-car">🚗 ' + (stats.bestLap.car_name || '—') + '</div>' +
                    '<div class="best-lap-date">' + formatDate(stats.bestLap.created_at) + '</div>' +
                    '</div></div>';
            } else {
                bestSection.innerHTML = '<div class="no-data-card">🏁 Нет записанных кругов. Участвуйте в гонках, чтобы установить рекорд!</div>';
            }

            // Recent laps
            const recentContainer = document.getElementById('recent-laps-container');
            if (!stats.recentLaps || stats.recentLaps.length === 0) {
                recentContainer.innerHTML = '<div class="no-data-card">Нет записанных кругов</div>';
            } else {
                const bestTime = stats.bestLap ? stats.bestLap.lap_time_ms : null;
                const rows = stats.recentLaps.map(function (lap) {
                    const isBest = bestTime && lap.lap_time_ms === bestTime;
                    return '<tr>' +
                        '<td>' + formatLapTime(lap.lap_time_ms) + (isBest ? '<span class="best-badge">Рекорд</span>' : '') + '</td>' +
                        '<td>' + (lap.car_name || '—') + '</td>' +
                        '<td>' + formatDate(lap.created_at) + '</td>' +
                        '</tr>';
                }).join('');
                recentContainer.innerHTML = '<table class="laps-table">' +
                    '<thead><tr><th>Время круга</th><th>Машина</th><th>Дата</th></tr></thead>' +
                    '<tbody>' + rows + '</tbody></table>';
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('profile-content').style.display = 'block';
        }

        // Avatar upload
        document.getElementById('avatar-input').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const statusEl = document.getElementById('upload-status');
            statusEl.textContent = 'Загрузка…';
            statusEl.style.color = 'rgba(255,255,255,0.5)';
            const formData = new FormData();
            formData.append('avatar', file);
            fetch('/api/profile/avatar', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'x-csrf-token': csrfToken },
                body: formData
            })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success) {
                        const container = document.getElementById('avatar-container');
                        container.innerHTML = '<img class="avatar-img" src="' + data.avatarPath + '?t=' + Date.now() + '" alt="Аватар">';
                        statusEl.textContent = 'Фото обновлено!';
                        statusEl.style.color = '#4caf50';
                        setTimeout(function () { statusEl.textContent = ''; }, 3000);
                    } else {
                        statusEl.textContent = data.error || 'Ошибка загрузки';
                        statusEl.style.color = '#f44336';
                    }
                })
                .catch(function () {
                    statusEl.textContent = 'Ошибка загрузки';
                    statusEl.style.color = '#f44336';
                });
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', function () {
            fetch('/api/auth/logout', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'x-csrf-token': csrfToken }
            })
                .then(function () { window.location.href = '/'; });
        });

        // Resend verification email
        var resendBtn = document.getElementById('resend-btn');
        if (resendBtn) {
            resendBtn.addEventListener('click', function () {
                resendBtn.disabled = true;
                resendBtn.textContent = 'Отправка…';
                fetch('/api/auth/resend-verification', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'x-csrf-token': csrfToken }
                })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        resendBtn.textContent = data.success ? '✅ Отправлено' : '❌ Ошибка';
                        setTimeout(function () {
                            resendBtn.disabled = false;
                            resendBtn.textContent = 'Отправить повторно';
                        }, 5000);
                    })
                    .catch(function () {
                        resendBtn.textContent = '❌ Ошибка';
                        setTimeout(function () {
                            resendBtn.disabled = false;
                            resendBtn.textContent = 'Отправить повторно';
                        }, 3000);
                    });
            });
        }

        // Username change
        var currentUsername = '';
        document.getElementById('username-edit-btn').addEventListener('click', function () {
            var input = document.getElementById('username-edit-input');
            input.value = currentUsername;
            document.getElementById('username-edit-form').classList.add('visible');
            document.getElementById('username-msg').style.display = 'none';
            input.focus();
        });
        document.getElementById('username-cancel-btn').addEventListener('click', function () {
            document.getElementById('username-edit-form').classList.remove('visible');
            document.getElementById('username-msg').style.display = 'none';
        });
        document.getElementById('username-save-btn').addEventListener('click', function () {
            var newName = document.getElementById('username-edit-input').value.trim();
            var saveBtn = document.getElementById('username-save-btn');
            var msgEl = document.getElementById('username-msg');
            if (!newName) return;
            saveBtn.disabled = true;
            saveBtn.textContent = 'Сохранение…';
            fetch('/api/profile/username', {
                method: 'PATCH',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json', 'x-csrf-token': csrfToken },
                body: JSON.stringify({ username: newName })
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.success) {
                        currentUsername = data.username;
                        document.getElementById('profile-username').textContent = data.username;
                        document.getElementById('username-edit-form').classList.remove('visible');
                        msgEl.textContent = '✅ Имя изменено';
                        msgEl.className = 'username-msg success';
                        msgEl.style.display = 'block';
                        setTimeout(function () { msgEl.style.display = 'none'; }, 4000);
                    } else {
                        msgEl.textContent = data.error || 'Ошибка';
                        msgEl.className = 'username-msg error';
                        msgEl.style.display = 'block';
                    }
                })
                .catch(function () {
                    msgEl.textContent = 'Ошибка сети';
                    msgEl.className = 'username-msg error';
                    msgEl.style.display = 'block';
                })
                .finally(function () {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Сохранить';
                });
        });

        loadProfile();

        // Load balance display
        fetch('/api/balance', { credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) {
                if (!d) return;
                var el = document.getElementById('profile-balance');
                if (el) el.textContent = 'Баланс: ' + (d.balance || 0).toFixed(2) + ' RC';
            })
            .catch(function () {});

        // Transaction history toggle
        var txLoaded = false;
        document.getElementById('transactions-toggle').addEventListener('click', function () {
            var content = document.getElementById('transactions-content');
            var isVisible = content.style.display !== 'none';
            content.style.display = isVisible ? 'none' : 'block';
            this.textContent = (isVisible ? '💳 Информация о транзакциях ▶' : '💳 Информация о транзакциях ▼');
            if (!isVisible && !txLoaded) {
                txLoaded = true;
                loadTransactions();
            }
        });

        function loadTransactions() {
            var container = document.getElementById('transactions-container');
            container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">Загрузка...</p>';
            fetch('/api/transactions', { credentials: 'same-origin' })
                .then(function (r) { return r.ok ? r.json() : null; })
                .then(function (data) {
                    if (!data || !data.transactions) {
                        container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">Нет данных</p>';
                        return;
                    }
                    var txs = data.transactions;
                    // Hide internal hold/release — user only sees net deductions
                    txs = txs.filter(function (tx) {
                        return tx.type !== 'hold' && tx.type !== 'release';
                    });
                    if (!txs.length) {
                        container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);">Транзакций пока нет</p>';
                        return;
                    }
                    var typeLabels = {
                        topup: 'Пополнение', hold: 'Блокировка',
                        deduct: 'Списание', release: 'Возврат', bonus: 'Бонус',
                        daily_bonus: 'Ежедневный бонус'
                    };
                    var typeClasses = {
                        topup: 'tx-type-topup', hold: 'tx-type-hold',
                        deduct: 'tx-type-deduct', release: 'tx-type-release', bonus: 'tx-type-bonus',
                        daily_bonus: 'tx-type-bonus'
                    };
                    var rows = txs.map(function (tx) {
                        var amtCls = tx.amount >= 0 ? 'tx-amount-pos' : 'tx-amount-neg';
                        var amtStr = (tx.amount >= 0 ? '+' : '') + tx.amount.toFixed(2) + ' RC';
                        var typeLabel = typeLabels[tx.type] || tx.type;
                        var typeCls = typeClasses[tx.type] || '';
                        var dateStr = tx.created_at ? tx.created_at.replace('T', ' ').slice(0, 16) : '—';
                        return '<tr>' +
                            '<td>' + esc(dateStr) + '</td>' +
                            '<td class="' + typeCls + '">' + esc(typeLabel) + '</td>' +
                            '<td class="' + amtCls + '">' + esc(amtStr) + '</td>' +
                            '<td>' + (tx.balance_after != null ? tx.balance_after.toFixed(2) + ' RC' : '—') + '</td>' +
                            '<td>' + esc(tx.description) + '</td>' +
                            '</tr>';
                    }).join('');
                    container.innerHTML =
                        '<table class="tx-table">' +
                        '<thead><tr><th>Дата</th><th>Тип</th><th>Сумма</th><th>Баланс после</th><th>Описание</th></tr></thead>' +
                        '<tbody>' + rows + '</tbody></table>';
                })
                .catch(function () {
                    container.innerHTML = '<p style="text-align:center;color:#ef5350;">Ошибка загрузки транзакций</p>';
                });
        }
    </script>
    <script src="js/nav.js"></script>
</body>
</html>
