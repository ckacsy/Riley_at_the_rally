<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Riley at the Rally</title>
    <link rel="stylesheet" href="styles/auth.css">
    <style>
        .submit-btn { background-color: #28a745; }
        .submit-btn:hover { background-color: #1e7e34; }
        .success-msg { padding: 10px; background: #d4edda; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="auth-nav"><a href="/">← Главная</a></div>
    <div class="auth-card">
        <h1>🏎️ Регистрация</h1>
        <div class="magic-link-banner">✨ <a href="/magic-link">Быстрая регистрация через email</a> — просто введите email, пароль не нужен!</div>
        <form id="register-form" novalidate autocomplete="on">

            <div class="form-group">
                <label for="username">Имя пользователя <span class="label-hint">(уникальный логин)</span></label>
                <input type="text" id="username" name="username"
                    placeholder="От 3 до 30 символов"
                    autocomplete="username" minlength="3" maxlength="30"
                    aria-describedby="username-err">
                <div class="field-error" id="username-err" role="alert"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="your@email.com"
                    autocomplete="email" maxlength="254"
                    aria-describedby="email-err">
                <div class="field-error" id="email-err" role="alert"></div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password"
                        placeholder="Минимум 8 символов"
                        autocomplete="new-password" minlength="8" maxlength="128"
                        aria-describedby="password-err">
                    <button type="button" class="toggle-pw" aria-label="Показать/скрыть пароль" data-target="password">👁</button>
                </div>
                <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>
                <div class="pw-strength-label" id="pw-label"></div>
                <div class="field-error" id="password-err" role="alert"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Подтверждение пароля</label>
                <div class="input-wrap">
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Повторите пароль"
                        autocomplete="new-password" maxlength="128"
                        aria-describedby="confirm_password-err">
                    <button type="button" class="toggle-pw" aria-label="Показать/скрыть пароль" data-target="confirm_password">👁</button>
                </div>
                <div class="field-error" id="confirm_password-err" role="alert"></div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                <span id="btn-text">Зарегистрироваться</span>
                <span class="spinner" id="btn-spinner"></span>
            </button>
            <div class="success-msg" id="success-msg"></div>
        </form>
        <div class="login-link">Уже есть аккаунт? <a href="/login">Войти</a></div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
