<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерфейс управления RC-машиной</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .control-panel {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 15px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            background-color: #ccc;
            vertical-align: middle;
        }
        .status-indicator.connected {
            background-color: #28a745;
        }
        .status-indicator.disconnected {
            background-color: #dc3545;
        }
        .camera-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
            max-width: 680px;
        }
        .camera-section h2 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #333;
        }
        .camera-feed {
            width: 640px;
            height: 480px;
            background-color: #000;
            border: 2px solid #ccc;
            border-radius: 5px;
            object-fit: contain;
        }
        .camera-url-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            justify-content: center;
        }
        .camera-url-input {
            flex: 1;
            max-width: 480px;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .camera-url-btn {
            padding: 6px 14px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .camera-url-btn:hover {
            background-color: #0056b3;
        }
        .speed-control {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            font-size: 16px;
            color: #333;
        }
        .speed-control label {
            font-weight: bold;
        }
        .speed-control input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 8px;
            border-radius: 5px;
            background-color: #007BFF;
            outline: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .speed-control input[type="range"]:hover {
            background-color: #0056b3;
        }
        .speed-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #007BFF;
            cursor: pointer;
        }
        .speed-control input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: white;
            border: 2px solid #007BFF;
            cursor: pointer;
        }
        .speed-control span {
            min-width: 32px;
            text-align: left;
        }
        .session-info {
            text-align: center;
            margin-top: 12px;
            font-size: 15px;
            color: #333;
        }
        .session-info span {
            font-weight: bold;
        }
        .end-rental-btn {
            display: block;
            margin: 24px auto 0;
            padding: 14px 36px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .end-rental-btn:hover {
            background-color: #a71d2a;
        }
        /* Summary overlay */
        .summary-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .summary-overlay.visible {
            display: flex;
        }
        .summary-card {
            background: white;
            border-radius: 10px;
            padding: 36px 48px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }
        .summary-card h2 {
            margin-top: 0;
            color: #333;
        }
        .summary-card p {
            font-size: 16px;
            color: #555;
            margin: 10px 0;
        }
        .summary-card .cost {
            font-size: 28px;
            font-weight: bold;
            color: #007BFF;
            margin: 16px 0;
        }
        .summary-card .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 32px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .summary-card .back-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Интерфейс управления RC-машиной</h1>

    <div class="session-info">
        Машина: <span id="car-name">—</span> &nbsp;|&nbsp; Время сессии: <span id="session-timer">00:00</span>
    </div>

    <div class="camera-section">
        <h2>Прямая трансляция камеры (требуется Raspberry Pi)</h2>
        <img id="camera-feed" class="camera-feed" src="" alt="Прямая трансляция — не подключено" />
        <div class="camera-url-row">
            <input
                type="text"
                id="camera-url-input"
                class="camera-url-input"
                placeholder="http://<ip-адрес-Pi>:8000"
            />
            <button class="camera-url-btn" id="camera-url-btn">Подключить</button>
        </div>
    </div>

    <div class="control-panel">
        <button class="button" id="forward">Вперёд</button>
        <button class="button" id="backward">Назад</button>
    </div>
    <div class="control-panel">
        <button class="button" id="left">Влево</button>
        <button class="button" id="right">Вправо</button>
    </div>
    <div class="speed-control">
        <label for="speed-slider">Скорость:</label>
        <input type="range" id="speed-slider" min="0" max="100" value="50" />
        <span id="speed-value">50</span>
    </div>
    <div class="status">
        <span class="status-indicator disconnected" id="status-dot"></span>
        <span id="status-text">Отключено</span>
    </div>

    <button class="end-rental-btn" id="end-rental">Завершить аренду</button>

    <!-- Rental summary overlay -->
    <div class="summary-overlay" id="summary-overlay">
        <div class="summary-card">
            <h2>Итоги аренды</h2>
            <p id="summary-car">Машина: —</p>
            <p id="summary-duration">Длительность: —</p>
            <p class="cost" id="summary-cost">$0.00</p>
            <button class="back-btn" id="back-to-main">К выбору машины</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // Restore session info from sessionStorage
        let sessionData = {};
        try {
            sessionData = JSON.parse(sessionStorage.getItem('activeSession') || '{}');
        } catch (e) {
            sessionData = {};
        }
        if (!sessionData.carId) {
            // No active session — redirect back to main page
            window.location.href = '/';
        }

        const carId = sessionData.carId || null;
        const carName = sessionData.carName || 'Unknown Car';
        const startTime = sessionData.startTime ? new Date(sessionData.startTime) : new Date();

        document.getElementById('car-name').textContent = carName;

        // Session timer
        let timerInterval = setInterval(function () {
            const elapsed = Math.floor((Date.now() - startTime.getTime()) / 1000);
            const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const seconds = String(elapsed % 60).padStart(2, '0');
            document.getElementById('session-timer').textContent = `${minutes}:${seconds}`;
        }, 1000);

        // Clear timer when leaving the page
        window.addEventListener('beforeunload', function () {
            clearInterval(timerInterval);
        });

        const socket = io(window.location.origin);

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');

        speedSlider.addEventListener('input', function () {
            speedValue.textContent = speedSlider.value;
        });

        socket.on('connect', function () {
            statusDot.classList.remove('disconnected');
            statusDot.classList.add('connected');
            statusText.textContent = 'Подключено';
        });

        socket.on('disconnect', function () {
            statusDot.classList.remove('connected');
            statusDot.classList.add('disconnected');
            statusText.textContent = 'Отключено';
        });

        socket.on('session_ended', function (data) {
            clearInterval(timerInterval);
            const durationSec = data.durationSeconds || 0;
            const cost = data.cost || 0;
            const minutes = Math.floor(durationSec / 60);
            const seconds = durationSec % 60;
            document.getElementById('summary-car').textContent = `Машина: ${carName}`;
            document.getElementById('summary-duration').textContent =
                `Длительность: ${minutes} мин ${seconds} с`;
            document.getElementById('summary-cost').textContent =
                `$${cost.toFixed(2)}`;
            document.getElementById('summary-overlay').classList.add('visible');
        });

        socket.on('session_error', function (data) {
            alert(data.message || 'Ошибка сессии. Перенаправление к выбору машины.');
            sessionStorage.removeItem('activeSession');
            window.location.href = '/';
        });

        document.getElementById('end-rental').addEventListener('click', function () {
            socket.emit('end_session', { carId: carId });
        });

        document.getElementById('back-to-main').addEventListener('click', function () {
            sessionStorage.removeItem('activeSession');
            window.location.href = '/';
        });

        document.getElementById('forward').addEventListener('click', function () {
            const speed = parseInt(speedSlider.value, 10);
            socket.emit('control_command', { direction: 'forward', speed: speed });
        });

        document.getElementById('backward').addEventListener('click', function () {
            const speed = parseInt(speedSlider.value, 10);
            socket.emit('control_command', { direction: 'backward', speed: -speed });
        });

        document.getElementById('left').addEventListener('click', function () {
            socket.emit('control_command', { steering_angle: -30 });
        });

        document.getElementById('right').addEventListener('click', function () {
            socket.emit('control_command', { steering_angle: 30 });
        });

        document.getElementById('camera-url-btn').addEventListener('click', function () {
            const url = document.getElementById('camera-url-input').value.trim();
            if (url && (url.startsWith('http://') || url.startsWith('https://'))) {
                const feed = document.getElementById('camera-feed');
                feed.src = url;
                feed.alt = 'Live camera feed';
            }
        });
    </script>
</body>
</html>
