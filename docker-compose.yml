version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - app-data:/app/backend/data
      - app-uploads:/app/backend/uploads
      - app-logs:/app/backend/logs
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on: []

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  app-data:
  app-uploads:
  app-logs:
